<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0b1220; color: #e2e8f0;
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    padding: 24px; text-align: center;
  }
  .card { max-width: 32rem; }
  h1 { font-size: 1.35rem; margin: 0 0 .75rem; }
  p { margin: 0 0 1rem; color: #94a3b8; }
  a { color: #7dd3fc; }
  .note { font-size: .85rem; color: #64748b; }
</style>
</head>
<body>
  <div class="card">
    <h1>On Service has a new address</h1>
    <p>Taking you to <a id="go" href="https://chiggy-dev.github.io/residency-field-guide/">chiggy-dev.github.io/residency-field-guide</a>…</p>
    <p class="note">If you added the old version to your home screen, delete it and add it again from the new address so it keeps updating.</p>
  </div>
<script>
(function () {
  var NEW_BASE = "https://chiggy-dev.github.io/residency-field-guide/";

  // Retire the old service worker and its caches, otherwise installed clients
  // keep being served the stale app from this scope and never see this page.
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(function (rs) {
      rs.forEach(function (r) { r.unregister(); });
    }).catch(function () {});
    if (window.caches && caches.keys) {
      caches.keys().then(function (ks) {
        ks.forEach(function (k) { caches.delete(k); });
      }).catch(function () {});
    }
  }

  var target = NEW_BASE + window.location.search + window.location.hash;
  document.getElementById("go").href = target;
  window.location.replace(target);
})();
</script>
</body>
