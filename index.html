<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>On Service — The Intern Field Guide</title>
<style>
  :root{
    --bg:#0b1220;
    --bg2:#0f172a;
    --panel:#111c30;
    --card:#15233c;
    --card2:#1b2c49;
    --line:#243a5e;
    --ink:#eaf1fb;
    --muted:#9fb3d1;
    --faint:#67809f;
    --teal:#2dd4bf;
    --teal-d:#0d9488;
    --blue:#60a5fa;
    --amber:#fbbf24;
    --rose:#fb7185;
    --green:#34d399;
    --violet:#a78bfa;
    --shadow:0 14px 40px rgba(0,0,0,.45);
    --shadow-sm:0 4px 14px rgba(0,0,0,.30);
    --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    background:
      radial-gradient(1100px 520px at 50% -8%, #16294a 0%, transparent 60%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  .app{max-width:680px;margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom));position:relative}
  a{color:var(--teal)}

  /* ---------- header ---------- */
  .hd{position:sticky;top:0;z-index:30;margin:0 -16px;padding:14px 16px 10px;
    background:linear-gradient(180deg,#0b1220 76%, rgba(11,18,32,0));backdrop-filter:blur(6px)}
  .hd-row{display:flex;align-items:center;gap:11px}
  .logo{width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--teal),var(--blue));box-shadow:var(--shadow-sm);font-size:21px}
  .hd-t{font-weight:850;font-size:18px;letter-spacing:.2px;line-height:1.05}
  .hd-s{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
  .hd-by{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.3px;margin-top:1px}
  .hd-prog{margin-left:auto;text-align:right}
  .hd-prog b{font-size:15px;color:var(--teal)}
  .hd-prog small{display:block;font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.6px}

  /* ---------- tabs ---------- */
  .tabs{display:flex;gap:6px;margin:6px -16px 4px;padding:4px 16px 10px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:none;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    padding:8px 14px;border-radius:999px;font-weight:750;font-size:13px;cursor:pointer;transition:.15s;white-space:nowrap}
  .tab.on{background:linear-gradient(135deg,var(--teal-d),#1e6f9c);border-color:transparent;color:#eafffb}
  .tab:active{transform:scale(.96)}

  /* ---------- generic card ---------- */
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:var(--r);padding:16px;margin-bottom:13px;box-shadow:var(--shadow-sm)}
  .eyebrow{font-size:10.5px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--teal)}
  h2.sec{font-size:20px;font-weight:850;margin:4px 0 2px}
  .lede{color:var(--muted);font-size:13.5px;line-height:1.5;margin:8px 0 0}

  /* ---------- lesson list cards ---------- */
  .lcard{cursor:pointer;position:relative;overflow:hidden}
  .lcard:active{transform:scale(.985)}
  .lcard .day{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:800;
    color:var(--blue);letter-spacing:.4px;text-transform:uppercase}
  .lcard h3{margin:8px 0 4px;font-size:17.5px;font-weight:820;line-height:1.18}
  .lcard p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}
  .lcard .meta{display:flex;align-items:center;gap:10px;margin-top:11px;font-size:11.5px;color:var(--faint);font-weight:650}
  .pill{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .pill.done{color:#04241d;background:var(--green);border-color:transparent}
  .chev{position:absolute;right:14px;bottom:14px;color:var(--faint);font-size:20px}

  /* ---------- reading view ---------- */
  .article h1{font-size:23px;font-weight:860;line-height:1.15;margin:2px 0 2px}
  .article .sub{color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.3px;margin-bottom:14px}
  .article h4{font-size:15.5px;font-weight:820;margin:20px 0 8px;color:#fff;display:flex;gap:8px;align-items:center}
  .article h4 .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex:none}
  .article p{font-size:14.5px;line-height:1.62;color:#dbe6f5;margin:0 0 11px}
  .article p strong, .article li strong{color:#fff}
  .article ul{margin:0 0 12px;padding-left:2px;list-style:none}
  .article ul li{position:relative;padding-left:20px;font-size:14px;line-height:1.55;color:#d3deef;margin-bottom:8px}
  .article ul li::before{content:"";position:absolute;left:3px;top:8px;width:6px;height:6px;border-radius:50%;
    background:var(--blue)}
  .step{display:flex;gap:12px;margin:0 0 11px;padding:12px 13px;background:#0e1b30;border:1px solid var(--line);border-radius:13px}
  .step .n{flex:none;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:850;font-size:13px;
    background:linear-gradient(135deg,var(--teal-d),#1e6f9c);color:#eafffb}
  .step .b{font-size:13.5px;line-height:1.5;color:#d8e3f3}
  .step .b b{color:#fff}
  .quote{border-left:3px solid var(--teal);background:#0e1b30;border-radius:0 12px 12px 0;
    padding:11px 14px;margin:0 0 12px;font-size:13.5px;line-height:1.55;color:#cfe}
  .callout{border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin:14px 0;background:#0e1b30}
  .callout .ttl{font-size:11px;font-weight:850;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
  .callout.good{border-color:#1f5e44}.callout.good .ttl{color:var(--green)}
  .callout.bad{border-color:#6b2a36}.callout.bad .ttl{color:var(--rose)}
  .callout p{font-size:13px;margin:0 0 8px}.callout p:last-child{margin:0}

  .backbar{display:flex;align-items:center;gap:10px;margin:2px 0 12px}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);font-weight:750;
    padding:9px 14px;border-radius:11px;font-size:13px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn:active{transform:scale(.96)}
  .btn.primary{background:linear-gradient(135deg,var(--teal-d),#1e6f9c);border-color:transparent;color:#eafffb}
  .btn.full{width:100%;justify-content:center;padding:13px}

  /* ---------- scenario engine ---------- */
  .scard{cursor:pointer}
  .scard:active{transform:scale(.985)}
  .scard .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tag{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .tag.sys{color:var(--violet);border-color:#3a3263}
  .tag.diff{color:var(--amber);border-color:#5e4a1f}

  .demo{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--faint);margin-top:11px;font-weight:650}
  .demo .difficulty{display:flex;gap:3px}
  .demo .difficulty i{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .demo .difficulty i.on{background:var(--amber)}

  /* ---------- acuity filter ---------- */
  .filterbar{display:flex;gap:6px;margin:0 0 13px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:5px}
  .fb{flex:1;border:none;background:transparent;color:var(--muted);border-radius:10px;padding:8px 4px;font-weight:780;font-size:12.5px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:2px}
  .fb small{font-size:10px;font-weight:800;opacity:.65}
  .fb:active{transform:scale(.95)}
  .fb.on{color:#fff}
  .fb.on[data-ac="0"]{background:linear-gradient(135deg,var(--teal-d),#1e6f9c)}
  .fb.on[data-ac="1"]{background:#1f5e44}
  .fb.on[data-ac="2"]{background:#5e4a1f}
  .fb.on[data-ac="3"]{background:#5b2230}
  .tag.acu1{color:var(--green);border-color:#1f5e44}
  .tag.acu2{color:var(--amber);border-color:#5e4a1f}
  .tag.acu3{color:var(--rose);border-color:#6b2a36}

  /* ---------- memory hook ---------- */
  .hookchip{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px;border:1px solid #3a3263;color:var(--violet);background:#15102a}
  .hook{display:flex;gap:10px;align-items:flex-start;border:1px solid #3a3263;background:#15102a;border-radius:13px;padding:12px 13px;margin:0 0 13px}
  .hook .hi{font-size:20px;flex:none;line-height:1}
  .hook .ht{font-size:10.5px;font-weight:850;letter-spacing:.8px;text-transform:uppercase;color:var(--violet);margin-bottom:3px}
  .hook .hb{font-size:13px;line-height:1.5;color:#e6e0f6}
  .hook .hb b{color:#fff}

  .chartrow{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .chartrow:last-child{border-bottom:none}
  .chartrow .ic{flex:none;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px;
    background:#0e1b30;border:1px solid var(--line)}
  .chartrow .lbl{font-size:10px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--faint)}
  .chartrow .val{font-size:13.5px;line-height:1.5;color:#dbe6f5;margin-top:2px}
  .chartrow .val b{color:#fff}
  .flag{color:var(--rose);font-weight:800}

  .reveal{border:1px dashed var(--line);border-radius:13px;padding:14px;margin:12px 0;text-align:center;
    color:var(--muted);font-size:13px;cursor:pointer;transition:.15s;background:#0d1730}
  .reveal:active{transform:scale(.98)}
  .reveal b{color:var(--teal)}

  .answer{border:1px solid #1f5e44;background:#0c1f1a;border-radius:13px;padding:14px;margin:12px 0}
  .answer .ttl{font-size:11px;font-weight:850;letter-spacing:.8px;text-transform:uppercase;color:var(--green);margin-bottom:8px;display:flex;align-items:center;gap:7px}
  .answer p{font-size:13.5px;line-height:1.6;margin:0 0 9px;color:#dcefe7}
  .answer p:last-child{margin:0}
  .answer .oneliner{font-style:italic;color:#fff;font-size:14px;border-left:3px solid var(--green);padding-left:11px;margin:0 0 11px}

  .wlist{list-style:none;margin:6px 0 0;padding:0}
  .wlist li{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #14243d;font-size:13.5px;line-height:1.5;color:#d8e3f3}
  .wlist li:last-child{border-bottom:none}
  .wlist li .k{flex:none;color:var(--teal);font-weight:850}
  .ddx li .k{color:var(--amber)}
  .cf li .k{color:var(--rose)}

  .selfgrade{display:flex;gap:8px;margin-top:6px}
  .sg{flex:1;text-align:center;border:1px solid var(--line);background:var(--panel);border-radius:11px;
    padding:11px 8px;font-weight:780;font-size:13px;cursor:pointer;transition:.15s}
  .sg:active{transform:scale(.96)}
  .sg.miss.on{background:#5b2230;border-color:transparent;color:#ffd9e0}
  .sg.partial.on{background:#5e4a1f;border-color:transparent;color:#ffe9bd}
  .sg.got.on{background:#1f5e44;border-color:transparent;color:#d6ffe9}

  /* ---------- toolkit ---------- */
  .tk h4{font-size:13.5px;font-weight:820;margin:0 0 9px;color:#fff;display:flex;gap:8px;align-items:center}
  .copybtn{margin-left:auto;font-size:11px;font-weight:750;color:var(--teal);border:1px solid var(--line);
    background:#0e1b30;border-radius:8px;padding:4px 9px;cursor:pointer}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.55;color:#cfe0f5;
    background:#0a1424;border:1px solid var(--line);border-radius:11px;padding:12px;white-space:pre-wrap;overflow-x:auto}
  .checkline{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #14243d;font-size:13.5px;color:#d8e3f3;line-height:1.45}
  .checkline:last-child{border-bottom:none}
  .checkline .m{flex:none;width:22px;height:22px;border-radius:7px;background:#0e1b30;border:1px solid var(--line);
    display:grid;place-items:center;font-weight:850;font-size:11px;color:var(--teal)}

  /* ---------- tips accordion ---------- */
  .acc{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:10px;
    background:linear-gradient(180deg,var(--card),var(--card2));box-shadow:var(--shadow-sm)}
  .acc-h{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer;user-select:none}
  .acc-h:active{background:#0e1b30}
  .acc-h .ai{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex:none;
    background:#0e1b30;border:1px solid var(--line)}
  .acc-h .at{font-weight:820;font-size:15px}
  .acc-h .ac{margin-left:auto;font-size:11px;font-weight:800;color:var(--faint);background:#0e1b30;border:1px solid var(--line);
    border-radius:999px;padding:2px 9px}
  .acc-h .arr{color:var(--faint);transition:.2s;font-size:19px;font-weight:700}
  .acc.open .arr{transform:rotate(90deg)}
  .acc-body{display:none;padding:0 14px 8px}
  .acc.open .acc-body{display:block;animation:fade .22s ease}
  .tip{display:flex;gap:11px;padding:11px 0;border-top:1px solid #14243d}
  .tip .tn{flex:none;color:var(--teal);font-size:15px;line-height:1.4;font-weight:800}
  .tip .tt{font-size:14px;line-height:1.56;color:#d6e1f1}
  .tip .tt b{color:#fff}

  /* ---------- emerging literature ---------- */
  .litnote{border:1px solid #5e4a1f;background:#1a1408;border-radius:12px;padding:11px 13px;margin-bottom:13px;
    font-size:12.5px;color:#e8dcc2;line-height:1.5}
  .trial{border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin:9px 0 0;background:#0e1b30}
  .trial .tname{font-weight:820;font-size:14px;color:#fff}
  .trial .tyear{font-size:10px;font-weight:800;color:var(--teal);border:1px solid #1f5e44;border-radius:999px;
    padding:2px 8px;margin-left:8px;white-space:nowrap}
  .trial .trow{font-size:12.8px;line-height:1.5;margin-top:6px;color:#d6e1f1}
  .trial .trow .lab{font-weight:800;color:var(--teal)}
  .trial .trow.why .lab{color:var(--amber)}

  /* ---------- smart phrases ---------- */
  .ph-search{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:12px;
    padding:11px 14px;font-size:14px;font-family:inherit;margin-bottom:6px;outline:none}
  .ph-search:focus{border-color:var(--teal)}
  .ph-search::placeholder{color:var(--faint)}
  .ph-count{font-size:11px;color:var(--faint);font-weight:700;margin:0 2px 10px}
  .ph-letter{font-size:12px;font-weight:850;color:var(--teal);letter-spacing:1.5px;margin:14px 2px 6px;
    border-bottom:1px solid var(--line);padding-bottom:3px}
  .ph-acc{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:7px;
    background:linear-gradient(180deg,var(--card),var(--card2))}
  .ph-h{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer;user-select:none}
  .ph-h:active{background:#0e1b30}
  .ph-h .pt{font-weight:750;font-size:13.5px;flex:1;min-width:0}
  .ph-h .arr{color:var(--faint);font-size:17px;font-weight:700;transition:.2s;flex:none}
  .ph-acc.open .ph-h .arr{transform:rotate(90deg)}
  .ph-copy{flex:none;font-size:11px;font-weight:750;color:var(--teal);border:1px solid var(--line);background:#0e1b30;
    border-radius:8px;padding:4px 10px;cursor:pointer}
  .ph-copy:active{transform:scale(.94)}
  .ph-body{display:none;padding:4px 13px 12px}
  .ph-acc.open .ph-body{display:block;animation:fade .2s ease}
  .ph-sub{font-weight:800;font-size:12px;color:var(--teal);margin:9px 0 3px}
  .ph-plan{font-weight:800;font-size:12px;color:var(--blue);margin:9px 0 3px}
  .ph-li{font-size:13px;line-height:1.5;color:#d6e1f1;padding:2px 0 2px 15px;position:relative}
  .ph-li::before{content:"\2022";position:absolute;left:3px;color:var(--faint)}
  .ph-li.lvl1{padding-left:30px}
  .ph-li.lvl1::before{left:17px;content:"\2013"}
  .ph-li b{color:#fff}
  .ph-note{font-size:11px;color:var(--faint);font-style:italic;margin:5px 0 0;padding-left:3px}

  /* ---------- bottom nav ---------- */
  .bnav{position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:linear-gradient(180deg,rgba(11,18,32,0),#0b1220 28%);padding:10px 14px calc(12px + env(safe-area-inset-bottom))}
  .bnav-in{max-width:680px;margin:0 auto;display:flex;gap:7px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:6px;box-shadow:var(--shadow)}
  .nb{flex:1;border:none;background:transparent;color:var(--muted);border-radius:10px;padding:7px 2px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9.5px;font-weight:800;transition:.15s}
  .nb .ni{font-size:16px}
  .nb.on{background:linear-gradient(135deg,var(--teal-d),#1e6f9c);color:#eafffb}
  .nb:active{transform:scale(.95)}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:60;
    background:#0c1f1a;border:1px solid #1f5e44;color:#d6ffe9;padding:10px 16px;border-radius:12px;font-weight:750;
    font-size:13px;opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .footer{text-align:center;color:var(--faint);font-size:11px;line-height:1.6;margin:18px 4px 4px}
  .fade{animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media print{.bnav,.tabs,.hd,.backbar{display:none}.app{max-width:none}body{background:#fff;color:#000}}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <div class="hd-row">
      <div class="logo">🩺</div>
      <div>
        <div class="hd-t">On Service</div>
        <div class="hd-s">The Intern Field Guide</div>
        <div class="hd-by">by Chirag Lodha</div>
      </div>
      <div class="hd-prog">
        <b id="progNum">0/3</b>
        <small>Lessons</small>
      </div>
    </div>
  </div>

  <div id="view"></div>

  <div class="footer">
    Educational content · not a substitute for clinical judgment or institutional policy.<br>
    Built for intern year. Works offline. Share the link with your co-interns.
  </div>
</div>

<div class="bnav">
  <div class="bnav-in">
    <button class="nb on" data-tab="learn"><span class="ni">📖</span>Lessons</button>
    <button class="nb" data-tab="cases"><span class="ni">🧩</span>Workups</button>
    <button class="nb" data-tab="lit"><span class="ni">📚</span>Lit</button>
    <button class="nb" data-tab="tips"><span class="ni">💡</span>Tips</button>
    <button class="nb" data-tab="phrases"><span class="ni">🗂️</span>Phrases</button>
    <button class="nb" data-tab="tools"><span class="ni">🧰</span>Toolkit</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   On Service — single-file intern field guide
   ============================================================ */

/* ---------------- LESSON CONTENT ---------------- */
const LESSONS = [
  {
    id:"d01", day:"Day 01 · Foundations", read:"6 min read",
    title:"The 7-Minute Pre-Round",
    blurb:"A time-anchored routine that turns a chart full of data into a story with a plan and a question.",
    body:`
<h4><span class="dot"></span>Why this matters</h4>
<p>An attending forms an opinion about you in the first three seconds of presentation. Most of what they're reading is whether you actually know your patient. The pre-round is where you earn that.</p>
<p>It's also where you learn medicine. The chart at 6 AM is where you discover that the patient who looked fine at sign-out is now sneakily oliguric, that the K has crept from 4.1 to 5.6 over three days, that the night nurse noted "patient up all night, anxious about going home" — and that's the missing piece in the discharge plan.</p>
<p>Most interns are inefficient in pre-rounds because nobody ever showed them the ropes. That's why I'm here to help guide you — nobody cares about your speed; we all just want to see you grow. There is a better way, and it takes seven minutes per patient. By June you'll do it in five. By PGY-2, three.</p>

<h4><span class="dot"></span>The 7-minute framework</h4>
<div class="step"><div class="n">1</div><div class="b"><b>Vitals trend.</b> Pull the last 24 h, not the latest reading. Better or worse? The patient whose HR crept 78→102 over six hours is the one to think about before rounds.</div></div>
<div class="step"><div class="n">2</div><div class="b"><b>I/Os and weights.</b> More important for your heart failure patients, concern for nutrition, etc. They tell you about fluid-balance trends, but also rely on your physical exam: do they look dry or wet? Do they sound dry or wet? Trend across days.</div></div>
<div class="step"><div class="n">3</div><div class="b"><b>Overnight events and consult notes.</b> Open the free-text nursing note — "up all night, anxious, refused 0300 vitals" gives you a good idea of how the patient is feeling, so go find out why. Read the consult notes that may have been signed late the previous day to find out what else your patient needs.</div></div>
<div class="step"><div class="n">4</div><div class="b"><b>The MAR, not the order list.</b> Orders show intent; the MAR shows reality — refused meds, late meds, six PRN morphine doses overnight, the AM antihypertensive declined three days running. This matters most for your patients on anticoagulation, HF medications, and diabetes management — and it's great for figuring out an effective pain regimen.</div></div>
<div class="step"><div class="n">5</div><div class="b"><b>New labs &amp; imaging, trended.</b> Review the labs — notice any trends? Trends tell a great story alongside the values. Look at the images and learn radiology as you go; nobody expects you to be an expert, but always look yourself — you may find something another person missed.</div></div>
<div class="step"><div class="n">6</div><div class="b"><b>Plan check.</b> What was outstanding yesterday? Did the consult come? Did the procedure happen? This is the "disposition" line at the bottom of your note. Fill the gaps you're waiting on when you ask yourself "why is this patient still here?" Jot a few quick reminders on your charting sheet (patient list, notebook) so nothing slips. Medicine has a lot of moving pieces — keep a checklist and take some of it off your mental burden.</div></div>
<div class="step"><div class="n">7</div><div class="b"><b>See the patient.</b> Build rapport — it always helps to talk about something the patient likes or a concern of theirs. Ask "how else can I help you?" That tells you what's important to them and surfaces concerns nobody's addressed yet. Meet them where they are. Explain what's going on in simple terms and why you're doing what you're doing; it helps them understand your framework and feel more assured about their stay.</div></div>

<h4><span class="dot"></span>Order of operations</h4>
<p>When you have 10 patients and 60 minutes:</p>
<ul>
<li><b>Sickest first</b> — the one you don't have the best feeling about, where something on chart review sounds off. Let your senior know, then go see them; it gives the team a heads-up. If they look "bad," touch base with your senior about whether they need a higher level of care. Always feel free to reach out to anyone on the team — we're all here to take the best care of our patients.</li>
<li><b>Discharges next</b> — they need orders early so case management, PT, and pharmacy can move.</li>
<li><b>Then the rest in presentation order</b> — usually geographic, to match how you'll round.</li>
</ul>

<h4><span class="dot"></span>Worked example — Mr. Patel, hospital day 2</h4>
<div class="quote">72M, HTN, prior MI 2018 with DES to LAD. Admitted day 2 for community-acquired pneumonia.</div>
<ul>
<li><b>Vitals:</b> Tmax 38.1 (down from 38.9). HR 78–88. BP stable. SpO₂ 96% on 2L, weaned from 4L.</li>
<li><b>I/O:</b> +400 over 24 h, down from +1200. UOP adequate.</li>
<li><b>Overnight:</b> Slept 5 h. No PRN antipyretics. Nurse: "asked when he can go home."</li>
<li><b>MAR:</b> Ceftriaxone + azithro on time. Took home metoprolol. Refused 0200 vitals.</li>
<li><b>Labs:</b> WBC 11.2 (was 14.1). Cr 1.1 stable. K 3.9. Trop neg ×2.</li>
<li><b>Plan check:</b> ID signed off. PT eval still pending.</li>
<li><b>Bedside:</b> Looks better. Eating breakfast. Walking more, less shortness of breath, some dull chest pain.</li>
</ul>
<div class="callout good"><div class="ttl">The one-liner it produces</div><p>"Day 2 CAP, clinically improving, weaned to 2L, off antipyretics, anticipated discharge tomorrow pending PT clearance."</p><p>You found something to act on (page PT at 0700), a question for the attending (follow-up CXR before discharge?), and a social piece (wife at bedside for discharge teaching today). Not a stack of data — a story with a plan and a question.</p></div>

<h4><span class="dot"></span>Common mistakes</h4>
<ul>
<li><b>Reading every note.</b> Read your own A&amp;P from yesterday plus new notes. That's it.</li>
<li><b>Chasing the latest lab.</b> Values are important, but trends provide the context to the patient.</li>
<li><b>Trusting the order list, not the MAR.</b> The MAR is reality. Don't note everything they didn't get — focus on the most pertinent ones that are obstacles to discharge.</li>
<li><b>Building the list in your head.</b> Find ways to remember your patients; it will help you keep them organized.</li>
</ul>
`

<h4><span class="dot"></span>Why this matters</h4>
<p>A well-structured presentation signals that you understand the patient. Verbalize your medical decision-making; be confident with a decision backed by your thought process, but make sure to verbalize how you got there.</p>

<h4><span class="dot"></span>The framework (known patient)</h4>
<div class="step"><div class="n">1</div><div class="b"><b>ID</b> (5s) — "Mr. Patel is a 72-year-old man with HTN and prior MI, admitted day 2 for CAP."</div></div>
<div class="step"><div class="n">2</div><div class="b"><b>One-liner</b> — the summary sentence that gets to the current state. "Clinically improving, weaning O₂, feeling better, working with PT since he said he felt unstable on his feet, and felt he did well yesterday."</div></div>
<div class="step"><div class="n">3</div><div class="b"><b>Overnight events</b> — significant events or "uneventful." Don't manufacture content.</div></div>
<div class="step"><div class="n">4</div><div class="b"><b>Subjective + objective</b> — how they feel and how they look. Skip anything normal and unchanged.</div></div>
<div class="step"><div class="n">5</div><div class="b"><b>Assessment &amp; plan, by problem</b> — the most important section. Each problem: brief assessment, concrete plan.</div></div>
<div class="step"><div class="n">6</div><div class="b"><b>Disposition</b> — "Anticipated discharge tomorrow if off O₂ and tolerating PO. It was recommended he go home with home-health PT; anticipated discharge pending arrangement of home-health services."</div></div>
<p><b>Total time:</b> doesn't matter — focus on the pertinent things that keep the patient in the hospital. Focus on what the team needs to know, since you're the one seeing the patient daily and you know the most about them. Advocate for your patient and bring up any concerns, no matter how small you think they are.</p>

<h4><span class="dot"></span>New admission vs. known patient</h4>
<p>A <b>new admission</b> gets 3–5 minutes: full HPI in narrative, relevant history, exam, data, and a full A&amp;P with your reasoning visible. The attending wants to hear you think — talk about your differential and what made you rule things in and out.</p>
<p>A <b>known patient</b> gets the abbreviated treatment once the attending knows you think about all aspects of the patient. Don't restate the full history; just give a brief one-liner so the attending remembers the patient. Reference history only when it changes today's plan.</p>

<h4><span class="dot"></span>The three questions every attending asks</h4>
<ul>
<li><b>What's the one-liner?</b> Can you summarize this patient in one sentence?</li>
<li><b>What are we doing today?</b> Do you have a plan, and is it specific?</li>
<li><b>When is discharge?</b> Do you have a disposition mindset, or just managing day-to-day?</li>
</ul>

<h4><span class="dot"></span>Two ways, same patient</h4>
<div class="callout good"><div class="ttl">Abbreviated presentation for a known patient</div><p>"Mr. Patel, 72, HTN and prior MI, admitted day 2 for CAP. Clinically improving. Overnight uneventful, slept five hours, no PRNs. This morning feels better — Tmax 38.1 from 38.9, sats 96% on 2L weaned from 4L, WBC 11 from 14. Problem 1, CAP: day 3 of ceftriaxone/azithromycin, day-5 course planned — continue, wean to room air today, no repeat imaging unless he stalls. Problem 2, HTN: well controlled on home meds. Anticipated discharge tomorrow if off O₂, tolerating PO, PT clears — PT eval pending, I'll follow up at 7."</p></div>

<h4><span class="dot"></span>Common mistakes</h4>
<ul>
<li><b>Starting with social history or the chronology of admission.</b> Start with the one-liner.</li>
<li><b>Listing labs without interpreting.</b> "WBC 11" is a number. "WBC 11 from 14, consistent with improvement" is an assessment.</li>
<li><b>No plan ready.</b> Give your opinion; talk with your senior and fellow if you're unsure. Back it up with your medical decision-making — just verbalize it well, even if you're unsure about the plan. It's great to see you thinking about your patients.</li>
</ul>
`

    body:`
<h4><span class="dot"></span>Why this matters</h4>
<p>Interns spend roughly a third of their working hours writing notes — 1,500+ over a year. At 30 minutes instead of 10, that's 500 hours, twelve and a half work weeks, spent typing. The note is the largest single lever for your wellbeing.</p>
<p>The fast intern isn't writing less carefully. They have a structure, set up their tools, and write the <b>adequate</b> note instead of the <b>perfect</b> note. 8–12 minutes for a complete daily progress note by year's end.</p>

<h4><span class="dot"></span>What a note is actually for</h4>
<ul>
<li><b>Documenting your clinical thinking</b> for the next clinician — and for yourself the next day. (Most important.)</li>
<li><b>Protecting you medico-legally</b> by showing reasoning.</li>
<li><b>Justifying billing.</b> Real, but not your problem yet — though it's worth writing the correct diagnoses as specifically as possible to build good habits early, before you become a fellow or attending.</li>
</ul>

<h4><span class="dot"></span>The structure</h4>
<div class="step"><div class="n">S</div><div class="b"><b>Subjective.</b> One or two sentences. How they feel, any new complaints. Skip the full ROS unless something new came up.</div></div>
<div class="step"><div class="n">O</div><div class="b"><b>Objective.</b> Vitals via smart phrase. Focused exam, not head-to-toe. Relevant labs/imaging <b>with interpretation</b>, not just values.</div></div>
<div class="step"><div class="n">A</div><div class="b"><b>Assessment &amp; plan.</b> Where you spend your time. By problem (not system, unless ICU). Each problem: brief assessment + concrete plan. Talk about why you think one diagnosis is more likely than another and why you ruled something else out.</div></div>

<h4><span class="dot"></span>The smart-phrase strategy</h4>
<p>The single biggest time-saver. Spend 30 minutes on day one; save 200 hours over the year. Set up at minimum:</p>
<ul>
<li>A <b>vitals/labs auto-pull</b> dot phrase (last 24 h vitals, I/O, recent labs in one keystroke).</li>
<li>A <b>standard exam</b> dot phrase — modify what's abnormal, the normal is already there.</li>
<li><b>A&amp;P templates</b> for your 5–10 most common conditions (CHF, COPD, CAP, sepsis, UTI, AKI, lytes, AFib, DM, dispo).</li>
<li>A <b>discharge summary</b> and an <b>H&amp;P</b> template.</li>
</ul>
<p>Yes, copy these from co-interns. The first intern of every year shouldn't reinvent them.</p>

<h4><span class="dot"></span>Common time-wasters</h4>
<ul>
<li><b>Writing notes during rounds.</b> You'll mishear the plan and miss teaching. Listen during, write after.</li>
<li><b>Writing patient-by-patient.</b> At pre-rounds open a skeleton (S+O auto-pulled) for everyone; fill A&amp;P after rounds. Finish 6 in the time you used to finish 3.</li>
<li><b>Copy-forwarding yesterday's note.</b> Faster short-term, dangerous long-term, increasingly audited. Start fresh; smart phrases make it nearly as fast. And <b>always</b> update your notes, so a covering or senior resident knows what was going on if you aren't there — teamwork makes the team run smoothly.</li>
<li><b>Writing the perfect note.</b> The patient is served by a note that conveys reality and a clinician who shows up rested tomorrow.</li>
</ul>

<div class="callout good"><div class="ttl">Focused — 175 words</div><p><b>S:</b> Feels better. Slept five hours. No SOB at rest. Tolerating diet. Asking about discharge.</p><p><b>O:</b> Tmax 38.1 (↓38.9). HR 78–88, BP 132/78, SpO₂ 96% on 2L (weaned from 4L). I/O +400. Comfortable, decreased BS RLL with mild crackles, otherwise unremarkable. WBC 11.2 (↓14.1), Cr 1.1 stable.</p><p><b>A/P:</b> 1) CAP HD2 — improving; continue ceftriaxone/azithro day 3 of 5, weaning O₂, no repeat imaging unless stall. 2) HTN — controlled on home metoprolol. 3) Dispo — d/c tomorrow pending PT + off O₂; PT pending, f/u 0700.</p></div>

<h4><span class="dot"></span>Calibration</h4>
<p>The 8-minute note is not lazy. It documents the same clinical reality with less typing. Being a good intern means getting the important things across to anybody reading your note while also protecting your time and getting home at a decent hour — burnout can come from writing notes all day, too.</p>
`

/* ---------------- STATE ---------------- */
const LS="onservice_v1";
let state = load();
function load(){ try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return{}} }
function save(){ try{localStorage.setItem(LS,JSON.stringify(state))}catch(e){} }
state.readLessons = state.readLessons || {};
state.caseGrades = state.caseGrades || {};
let tab = "learn";

/* ---------------- HELPERS ---------------- */
const $ = sel => document.querySelector(sel);
const view = $("#view");
function esc(s){return s}
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1700)}
function lessonsDone(){return Object.values(state.readLessons).filter(Boolean).length}
function updProg(){$("#progNum").textContent=lessonsDone()+"/"+LESSONS.length}

/* ---------------- RENDER: LESSONS LIST ---------------- */
function renderLearn(){
  let h = `<div class="card">
    <div class="eyebrow">30-Day Intern Curriculum</div>
    <h2 class="sec">On Service · Foundations</h2>
    <p class="lede">Three foundation skills that make every other day of intern year easier. Read them in order; the worked examples carry through. Then practice on the Workups tab.</p>
  </div>`;
  LESSONS.forEach(l=>{
    const done = !!state.readLessons[l.id];
    h += `<div class="card lcard" data-lesson="${l.id}">
      <div class="day">📅 ${l.day}</div>
      <h3>${l.title}</h3>
      <p>${l.blurb}</p>
      <div class="meta">
        <span class="pill ${done?'done':''}">${done?'✓ Read':'Not read'}</span>
        <span>${l.read}</span>
      </div>
      <div class="chev">›</div>
    </div>`;
  });
  view.className="fade";view.innerHTML=h;
  view.querySelectorAll("[data-lesson]").forEach(el=>el.onclick=()=>openLesson(el.dataset.lesson));
}

function openLesson(id){
  const l = LESSONS.find(x=>x.id===id);
  const done = !!state.readLessons[id];
  let h = `<div class="backbar">
      <button class="btn" id="back">‹ Lessons</button>
      <button class="btn ${done?'':'primary'}" id="mark">${done?'✓ Marked read':'Mark as read'}</button>
    </div>
    <div class="card article">
      <div class="day" style="color:var(--blue);font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase">${l.day} · ${l.read}</div>
      <h1>${l.title}</h1>
      ${l.body}
    </div>`;
  // next lesson nav
  const idx = LESSONS.findIndex(x=>x.id===id);
  if(idx<LESSONS.length-1){
    h += `<button class="btn primary full" id="next">Next · ${LESSONS[idx+1].title} ›</button>`;
  } else {
    h += `<button class="btn primary full" id="toCases">Practice the workups ›</button>`;
  }
  view.className="fade";view.innerHTML=h;window.scrollTo(0,0);
  $("#back").onclick=renderLearn;
  $("#mark").onclick=()=>{state.readLessons[id]=!state.readLessons[id];save();updProg();openLesson(id);if(state.readLessons[id])toast("Marked as read ✓")};
  const nx=$("#next");if(nx)nx.onclick=()=>openLesson(LESSONS[idx+1].id);
  const tc=$("#toCases");if(tc)tc.onclick=()=>{tab="cases";setActiveNav();renderCases()};
}

/* ---------------- RENDER: CASES LIST ---------------- */
function acuityLabel(a){return a===1?"Stable":a===2?"Watcher":"Sick"}
function acuityEmoji(a){return a===1?"🟢":a===2?"🟡":"🔴"}
function renderCases(){
  if(state.caseFilter==null)state.caseFilter=0;
  const f=state.caseFilter;
  const counts={0:CASES.length,1:0,2:0,3:0};
  CASES.forEach(c=>counts[c.acuity]++);
  const list=CASES.filter(c=>f===0||c.acuity===f);
  const graded=Object.keys(state.caseGrades).length;
  let h=`<div class="card">
    <div class="eyebrow">Practice · Workups</div>
    <h2 class="sec">Build the one-liner, then the workup</h2>
    <p class="lede">Each case is a 6 AM chart, organized the way Day 01 taught you to read it. Form your one-liner and diagnostic plan, then check it against the model. ${graded?`<b style="color:var(--teal)">${graded}/${CASES.length} attempted.</b> `:''}<span style="color:var(--violet)">🧠 = the patient's name is a memory hook.</span></p>
  </div>
  <div class="filterbar">
    ${[[0,"All"],[1,"Stable"],[2,"Watcher"],[3,"Sick"]].map(a=>`<button class="fb ${f===a[0]?'on':''}" data-ac="${a[0]}">${a[0]===0?'◎':acuityEmoji(a[0])} ${a[1]}<small>${counts[a[0]]}</small></button>`).join("")}
  </div>`;
  if(!list.length)h+=`<div class="card"><p class="lede">No cases at this acuity level.</p></div>`;
  list.forEach(c=>{
    const g = state.caseGrades[c.id];
    h += `<div class="card scard" data-case="${c.id}">
      <div class="day" style="color:var(--violet);font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase">${c.system}</div>
      <h3 style="margin:8px 0 4px;font-size:17px;font-weight:820">${c.name}</h3>
      <p style="margin:0;color:var(--muted);font-size:13px;line-height:1.5">${c.summary}</p>
      <div class="tags">
        <span class="tag acu${c.acuity}">${acuityEmoji(c.acuity)} ${acuityLabel(c.acuity)}</span>
        ${c.hook?`<span class="hookchip">🧠 Name hook</span>`:''}
        ${c.tags.map(t=>`<span class="tag diff">${t}</span>`).join("")}
        ${g?`<span class="tag" style="color:var(--green);border-color:#1f5e44">✓ ${g}</span>`:''}
      </div>
      <div class="demo">
        <span>Acuity</span>
        <span class="difficulty">${[1,2,3].map(n=>`<i class="${n<=c.acuity?'on':''}"></i>`).join("")}</span>
        <div class="chev" style="position:static;margin-left:auto">›</div>
      </div>
    </div>`;
  });
  view.className="fade";view.innerHTML=h;window.scrollTo(0,0);
  view.querySelectorAll(".fb").forEach(b=>b.onclick=()=>{state.caseFilter=+b.dataset.ac;save();renderCases();});
  view.querySelectorAll("[data-case]").forEach(el=>el.onclick=()=>openCase(el.dataset.case));
}

      <div class="ic">${r.ic}</div>

function showModel(c){
  const rv=$("#reveal");rv.style.display="none";
  const ddx = c.ddx.map(d=>`<li><span class="k">${d[0]}</span><span>${d[1]}</span></li>`).join("");
  const cf = (c.confounders||[]).map(d=>`<li><span class="k">${d[0]}</span><span>${d[1]}</span></li>`).join("");
  const wk = c.workup.map(d=>`<li><span class="k">${d[0]}</span><span>${d[1]}</span></li>`).join("");
  const mg = c.mgmt.map(m=>`<li><span class="k">→</span><span>${m}</span></li>`).join("");
  const grade = state.caseGrades[c.id];
  let h = `<div class="answer">
      <div class="ttl">✓ Model one-liner</div>
      <p class="oneliner">${c.model.oneliner}</p>
      ${c.model.paras.map(p=>`<p>${p}</p>`).join("")}
    </div>
    <div class="card">
      <div class="eyebrow" style="color:var(--amber)">Differential — frame it the way you'll work it up</div>
      <div style="font-size:12.5px;color:var(--muted);margin:4px 0 6px">Working dx: <b style="color:#fff">${c.dx}</b></div>
      <ul class="wlist ddx">${ddx}</ul>
    </div>
    ${c.confounders?`<div class="card" style="border-color:#6b2a36;background:#1a0f16">
      <div class="eyebrow" style="color:var(--rose)">⚠ Don't anchor — confounders &amp; can't-miss</div>
      <div style="font-size:12px;color:var(--muted);margin:4px 0 6px">The diagnoses that get anchored away — and the lethal mimics worth one deliberate thought before you commit.</div>
      <ul class="wlist cf">${cf}</ul>
    </div>`:''}
    <div class="card">
      <div class="eyebrow">Targeted workup</div>
      <ul class="wlist">${wk}</ul>
    </div>
    <div class="card">
      <div class="eyebrow" style="color:var(--green)">Initial management</div>
      <ul class="wlist">${mg}</ul>
    </div>
    <div class="callout" style="border-color:#2a4a63;background:#0c1a2a">
      <div class="ttl" style="color:var(--teal)">Pearl</div>
      <p style="margin:0">${c.pearl}</p>
    </div>
    <div class="card">
      <div class="eyebrow">How close was your read?</div>
      <div class="selfgrade">
        <div class="sg miss ${grade==='Missed it'?'on':''}" data-g="Missed it">Missed it</div>
        <div class="sg partial ${grade==='Partly'?'on':''}" data-g="Partly">Partly</div>
        <div class="sg got ${grade==='Nailed it'?'on':''}" data-g="Nailed it">Nailed it</div>
      </div>
    </div>
    <button class="btn primary full" id="nextCase">Next workup ›</button>`;
  $("#modelWrap").innerHTML=h;
  $("#modelWrap").scrollIntoView({behavior:"smooth",block:"start"});
  $("#modelWrap").querySelectorAll(".sg").forEach(el=>el.onclick=()=>{
    state.caseGrades[c.id]=el.dataset.g;save();
    $("#modelWrap").querySelectorAll(".sg").forEach(x=>x.classList.remove("on"));
    el.classList.add("on");toast("Logged: "+el.dataset.g);
  });
  $("#nextCase").onclick=()=>{
    const idx=CASES.findIndex(x=>x.id===c.id);
    const nxt=CASES[(idx+1)%CASES.length];openCase(nxt.id);
  };
}

    <div class="checkline"><div class="m">!</div><div><b>Hyponatremia</b> → tonicity → volume → urine osm → urine Na · cap correction ≤6–8 mEq/24h</div></div>

  </div>

  <button class="btn full" id="reset">Reset my progress</button>`;
  view.className="fade";view.innerHTML=h;window.scrollTo(0,0);

/* ---------------- TIPS & TRICKS ---------------- */
const TIPS = [
  {cat:"Speed & survival", icon:"⏱️", items:[
    ["Carry paper.","A printed list with room for vitals, to-dos, and a checkbox column beats any app when your hands are full and the EMR is down. The checkbox is the point — you close loops, not leave them open."],
    ["Touch each task once.","When you open a result, act on it then — order the follow-up, page the consult, write the note line — instead of re-reading the same value three times today."],
    ["Batch by location.","Don't walk to the same unit five times. Group your orders, bedside visits, and pages by floor and do them in one pass."],
    ["The two-minute rule.","If a task takes under two minutes — a one-line order, a quick call — do it now. Anything longer goes on the list so it doesn't live in your head."],
    ["Do the discharges first.","Early discharge orders free up case management, pharmacy, PT, and a bed. A discharge written at 4 PM becomes a discharge tomorrow."],
    ["Protect the overlap hour.","The time when both you and the day team are present is when questions and handoffs are cheap. Don't burn it on notes you could write later."]
  ]},
  {cat:"Rounds & presenting", icon:"🎤", items:[
    ["Lead with the assessment.","If you get one sentence out before the attending interrupts, make it the one-liner — not the social history or the chronology of admission."],
    ["Have a number for everything.","'The potassium is up' is weak. 'K 5.6 from 4.1 with peaked T's on the 6 AM ECG' is a presentation."],
    ["Pre-write your plan.","Decide what you'd do before rounds. The attending may change it — but having a plan to change is the whole job. 'We'll see what the consultant says' is not a plan."],
    ["Anticipate the one question.","For each patient, predict the thing the attending will ask — 'when's discharge?', 'did you check the trend?' — and have the answer loaded."],
    ["'I don't know — I'll find out.'","Then actually find out and close the loop. It's the most trusted sentence in medicine when you follow through."]
  ]},
  {cat:"Notes & documentation", icon:"📝", items:[
    ["Write after rounds, not during.","Write during rounds and you'll mishear the plan and miss the teaching. Listen during, document after."],
    ["Open skeletons at pre-round.","Auto-pull vitals and labs into every note before rounds; fill the A&P after. You'll finish six notes in the time you used to finish three."],
    ["Interpret, don't transcribe.","Every value should earn its place with a clause: '...trending down', '...consistent with improvement', '...new since yesterday.' A number alone is not information."],
    ["Never blind copy-forward.","It propagates yesterday's errors into today's chart and is increasingly audited. Smart phrases make a fresh note nearly as fast."],
    ["Document the conversation.","The family meeting, the consultant's verbal rec, the goals-of-care talk — if it mattered and it's not written, it didn't happen."]
  ]},
  {cat:"Pages & cross-cover", icon:"📟", items:[
    ["Lay eyes on the unstable patient.","A page about a tachycardic, hypotensive, or desatting patient is a 'go see them' page — not a 'put in an order from the workroom' page."],
    ["Ask the nurse what worries them.","'What are you most concerned about?' surfaces the real problem faster than the structured page text ever will."],
    ["Vitals, then chart, then room.","For any cross-cover call, get the trend before you decide it's nothing. The single number is meaningless without the slope."],
    ["Know the four floor killers.","Hypotension, hypoxia, altered mental status, and chest pain get you to the bedside, every time, no exceptions."],
    ["Same fire twice → escalate.","A second call for the same problem means your first fix didn't work. Loop in your senior rather than re-trying the same thing."]
  ]},
  {cat:"Calling consults", icon:"📞", items:[
    ["Bring a question, not just a patient.","'Renal, can you see this AKI?' is weak. 'Renal — stage 2 AKI not responding to volume, is there a role for biopsy?' gets a useful answer."],
    ["Do your own workup first.","Consultants help most when the basic labs and imaging are already done. Don't outsource the urine studies you could have ordered."],
    ["Use the 5 C's.","Contact info, Courtesy (introduce yourself), a Clinical one-liner, a specific Clinical question, and the urgency. In that order."],
    ["Write down the rec and who gave it.","'Per Dr. X (cards), ok to anticoagulate' protects everyone and closes the loop. Verbal recs evaporate."]
  ]},
  {cat:"Communication", icon:"🤝", items:[
    ["Befriend the nurses.","They will save you — and your patients — more times than any attending. Answer their pages, thank them, and ask their read on the patient."],
    ["Update families before they ask.","A two-minute proactive update prevents a twenty-minute defensive one, and builds the trust you'll need on a bad day."],
    ["Use teach-back.","Ask the patient to repeat the plan in their own words. It surfaces the misunderstanding before discharge, not after the bounce-back."],
    ["Disagree up, support down.","Voice concerns to your senior privately. Never undercut a nurse, student, or colleague in front of the patient."]
  ]},
  {cat:"Procedures", icon:"🩹", items:[
    ["See one, simulate one, then do one.","Practice on the model and verbalize every step out loud before you touch a patient. Competence is rehearsed, not improvised."],
    ["Set up completely before you start.","Every piece of kit open and within reach. Procedures go wrong when you're reaching for the thing you forgot to open."],
    ["Consent is a conversation about risk.","Know the real complication rate and the alternatives. Patients can tell when you don't, and it's their decision to make."],
    ["Know your out.","Before any procedure, know what you'll do and who you'll call if it doesn't go to plan. Have that number before you start, not after."]
  ]},
  {cat:"Wellbeing & growth", icon:"❤️", items:[
    ["Eat, pee, sit when you can.","You can't resuscitate anyone if you've crashed yourself. Five minutes of lunch is patient care, not a luxury."],
    ["Keep a 'good catch' list.","Write down what you caught early — the creeping K, the missed PE risk. On hard days it's evidence you're becoming a doctor."],
    ["One question per patient per day.","Look up one real thing about a patient you're carrying. That's how you actually learn medicine — not from didactics."],
    ["Mistakes get disclosed, not hidden.","When you err: tell your senior, disclose per institutional process, document, and learn. The cover-up is always worse than the error."],
    ["Be disciplined now; speed follows.","You will not be fast in July — nobody is. Speed is a consistent structure run a hundred times. It follows discipline; it never replaces it."]
  ]}
];

meds/abx **\n- Admit labs: AST/ALT ***, T/D bili **/**, INR **, lactate **, ammonia ***, Tylenol level ***; MS ***\nPlan:\n- Alt-etiology w/u: acute hepatitis panel, HCV RNA, HSV IgM/IgG + PCR, EBV/VZV, HIV, UDS, EtOH, PEth, ANA, ASMA, QuantiFERON, AMA, anti-LKM, IgG/A/M, ceruloplasmin, A1AT\n- TSH, FT4, haptoglobin, retics, Coombs, uric acid, iron studies; fibrinogen, PTT, TEG; T&S\n- Lactate, serum osm, AFP, ABG; US abd w/ Doppler; if leukocytosis: UA, blood cx, CXR\n- Monitor encephalopathy + hypoglycemia; LFT/BMP q6h; phos/lytes q6h + replace\n- IV NAC per protocol until APAP undetectable, INR <2, LFTs <1000 x3\nTransplant eval\n- Consider Liver Transplant Service\n- MELD Score\n- Alcoholic hepatitis? Maddrey’s score: **\nEncephalopathy\n- CT head non-con; lactulose 20g TID (goal 2-3 soft BMs); can consider rifaximin as adjunct therapy if refractory\n- HOB 30°; minimize stimuli/suctioning; avoid overload;\nCoagulopathy\n- INR ***, PTT ***, fibrinogen ***; CBC/INR/PTT/fibrinogen q4-6h; watch bleeding; vitamin K 10mg SC daily x3\nRenal\n- Nephro if refractory AKI/worsening hyponatremia/ concern for HRS\n- If HRS concern, can treat with albumin for up to 72 hours per guidelines\nInfection\n- Concern for SBP:\n- Fluid studies:\n- Abx:\nNutrition\n- Nutrition consult\n- Protein supplementation per RDN recommendations, could worsen HE", "q": "acute liver failure — likely 2/2 *** - history of chronic liver disease? - criteria: ↑transaminases + encephalopathy + inr >1.5 - depression/si **; etoh **; herbals **; new meds/abx ** - admit labs: ast/alt ***, t/d bili **/**, inr **, lactate **, ammonia ***, tylenol level ***; ms *** plan: - alt-etiology w/u: acute hepatitis panel, hcv rna, hsv igm/igg + pcr, ebv/vzv, hiv, uds, etoh, peth, ana, asma, quantiferon, ama, anti-lkm, igg/a/m, ceruloplasmin, a1at - tsh, ft4, haptoglobin, retics, coombs, uric acid, iron studies; fibrinogen, ptt, teg; t&s - lactate, serum osm, afp, abg; us abd w/ doppler; if leukocytosis: ua, blood cx, WATERFALL); ↑Ca → fluids + bisphosphonate ± calcitonin</div><div class=\"ph-li\">NPO → advance as tolerated, improved recovery when fed earlier; hepatic panel; EtOH/PEth</div><div class=\"ph-li\">Necrotizing → meropenem + serial CT, monitor for shock</div><div class=\"ph-li\"><b>Drug causes:</b> tetracyclines, sulfonamides, pentamidine, HIV meds, INH, metronidazole; azathioprine, sulfasalazine, mesalamine, 6-MP; amiodarone, losartan, furosemide, statins; valproate; ATRA; GLP-1</div>", "x": "Acute Pancreatitis\n- ≥2 of: lipase >3x ULN, clinical findings, imaging\n- Etiologies: gallstones (40-50%), EtOH (30%), ↑TG (10%), ↑Ca, iatrogenic, trauma, IPMN/cyst, CF, autoimmune\n- Sx ***; lipase ***; CT/US ***; TG ***; home meds ***; APACHE-II ***; NLR ***\nPlan:\n- CT/RUQ US for stones (stones → delayed chole; persistent choledocho → ERCP)\n- LR resuscitation to HDS, low maintenance (WATERFALL); ↑Ca → fluids + bisphosphonate ± calcitonin\n- NPO → advance as tolerated, improved recovery when fed earlier; hepatic panel; EtOH/PEth\n- Necrotizing → meropenem + serial CT, monitor for shock\n- Drug causes: tetracyclines, sulfonamides, pentamidine, HIV meds, INH, metronidazole; azathioprine, sulfasalazine, mesalamine, 6-MP; amiodarone, losartan, furosemide, statins; valproate; ATRA; GLP-1", "q": "acute pancreatitis - ≥2 of: lipase >3x uln, clinical findings, imaging - etiologies: gallstones (40-50%), etoh (30%), ↑tg (10%), ↑ca, iatrogenic, trauma, ipmn/cyst, cf, autoimmune - sx ***; lipase ***; ct/us ***; tg ***; home meds ***; apache-ii ***; nlr *** plan: - ct/ruq us for stones (stones → delayed chole; persistent choledocho → ercp) - lr resuscitation to hds, low maintenance (waterfall); ↑ca → fluids + bisphosphonate ± calcitonin - npo → advance as tolerated, improved recovery when fed earlier; hepatic panel; etoh/peth - necrotizing → meropenem + serial ct, monitor for shock - drug causes: tetracyclines, sulfonamides, pentamidine, hiv meds, inh, metronidazole; azathioprine, sulfasalazine, mesalamine, 6-mp; amiodarone, losartan, furosemide, statins; valproate; atra; glp-1"}, {"t": "Acute Pulmonary Embolism A-E Classification", "L": "A", "h": "<div class=\"ph-li\"><b>Sx:</b> SOB, hypoxia, tachycardia; EKG ***; V/Q (if poor CrCl + can hold breath) ***; CTA PE ***</div><div class=\"ph-li\">PESI or s-PESI score:</div><div class=\"ph-li\">Classification A-E</div><div class=\"ph-li\"><b>A:</b> Incidental and asymptomatic DOAC, hospitalization not indicated</div><div class=\"ph-li\"><b>B:</b> Admission  DOAC</div><div class=\"ph-li\"><b>B1:</b> Subsegmental (single/multiple)</div><div class=\"ph-li\"><b>B2:</b> Non-subsegmental</div><div class=\"ph-li\"><b>C:</b> LMWH</div><div class=\"ph-li\"><b>C1:</b> Normal RV AND normal biomarkers</div><div class=\"ph-li\"><b>C2:</b> Abnormal RV OR at least 1 abnormal biomarker</div><div class=\"ph-li\"><b>C3:</b> Abnormal RV AND at least 1 abnormal biomarker</div><div class=\"ph-li\"><b>Respiratory modifier:</b> O2 &lt;90%, RR 30 or greater, need for supplemental O2</div><div class=\"ph-li\"><b>D:</b> Consider thrombolysis (catheter vs systemic) vs surgical intervention</div><div class=\"ph-li\"><b>D1:</b> Transient hypotension (systolic &lt;90)</div><div class=\"ph-li\"><b>D2:</b> Normotensive shock (Lactate &gt;2 mmol/L AKI, UOP &lt;0.5 mL/kg/hr, mental status change, MAP &lt;60)</div><div class=\"ph-li\"><b>Respiratory modifier:</b> &gt;6L NC or use of nonrebreather mask</div><div class=\"ph-li\"><b>E:</b> LMWH or UFH with vasopressors/inotropes, consider ECMO if still refractory</div><div class=\"ph-li\"><b>E1:</b> Recurrent or persistent hypotension with cardiogenic shock</div><div class=\"ph-li\"><b>E2:</b> Refractory cardiogenic shock or cardiac arrest</div><div class=\"ph-li\"><b>Respiratory modifier:</b> Hypoxemic respiratory failure OR ventilatory failure</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">Lactate; telemetry; PT/INR, aPTT, fibrinogen, D-dimer</div><div class=\"ph-li\"><b>RH strain:</b> TTE (RV dilation, septal flattening), BNP, troponin</div><div class=\"ph-li\">Low risk → anticoagulate + O2</div><div class=\"ph-li\">Higher risk → IR for thrombectomy + pressors; consider tPA 50mg IV bolus</div>", "x": "Acute Pulmonary Embolism A-E Classification\n- Sx: SOB, hypoxia, tachycardia; EKG ***; V/Q (if poor CrCl + can hold breath) ***; CTA PE ***\n- PESI or s-PESI score:\n- Classification A-E\n- A: Incidental and asymptomatic DOAC, hospitalization not indicated\n- B: Admission  DOAC\n- B1: Subsegmental (single/multiple)\n- B2: Non-subsegmental\n- C: LMWH\n- C1: Normal RV AND normal biomarkers\n- C2: Abnormal RV OR at least 1 abnormal biomarker\n- C3: Abnormal RV AND at least 1 abnormal biomarker\n- Respiratory modifier: O2 <90%, RR 30 or greater, need for supplemental O2\n- D: Consider thrombolysis (catheter vs systemic) vs surgical intervention\n- D1: Transient hypotension (systolic <90)\n- D2: Normotensive shock (Lactate >2 mmol/L AKI, UOP <0.5 mL/kg/hr, mental status change, MAP <60)\n- Respiratory modifier: >6L NC or use of nonrebreather mask\n- E: LMWH or UFH with vasopressors/inotropes, consider ECMO if still refractory\n- E1: Recurrent or persistent hypotension with cardiogenic shock\n- E2: Refractory cardiogenic shock or cardiac arrest\n- Respiratory modifier: Hypoxemic respiratory failure OR ventilatory failure\nPlan:\n- Lactate; telemetry; PT/INR, aPTT, fibrinogen, D-dimer\n- RH strain: TTE (RV dilation, septal flattening), BNP, troponin\n- Low risk → anticoagulate + O2\n- Higher risk → IR for thrombectomy + pressors; consider tPA 50mg IV bolus", "q": "acute pulmonary embolism a-e classification - sx: sob, hypoxia, tachycardia; ekg ***; v/q (if poor crcl + can hold breath) ***; cta pe *** - pesi or s-pesi score: - classification a-e - a: incidental and asymptomatic doac, hospitalization not indicated - b: admission doac - b1: subsegmental (single/multiple) - b2: non-subsegmental - c: lmwh - c1: normal rv and normal biomarkers - c2: abnormal rv or at least 1 abnormal biomarker - c3: abnormal rv and at least 1 abnormal biomarker - respiratory modifier: o2 <90%, rr 30 or greater, need for supplemental o2 - d: consider thrombolysis (catheter vs systemic) vs surgical intervention - d1: transient hypotension (systolic <90) - d2: normotensive shock (lactate >2 mmol/l aki, uop <0.5 ml/kg/hr, mental status change, map <60) - respiratory modifier: >6l nc or use of nonrebreather mask - e: lmwh or ufh with vasopressors/inotropes, consider ecmo if still refractory - e1: recurrent or persistent hypotension with cardiogenic shock - e2: refractory cardiogenic shock or cardiac arrest - respiratory modifier: hypoxemic respiratory failure or ventilatory failure plan: - lactate; telemetry; pt/inr, aptt, fibrinogen, d-dimer - rh strain: tte (rv dilation, septal flattening), bnp, troponin - low risk → anticoagulate + o2 - higher risk → ir for thrombectomy + pressors; consider tpa 50mg iv bolus"}, {"t": "Acute Rejection of Transplanted Liver", "L": "A", "h": "<div class=\"ph-li\">Transplanted ***; prior rejections ***; prior ATG *** (dose ***)</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">RUQ Doppler, CT liver triple-phase; NPO (possible bx); IR for TJL biopsy (f/u AM)</div><div class=\"ph-li\">Continue immunosuppression: tacrolimus ***, MMF ***; FK trough &lt;1h before AM dose</div><div class=\"ph-li\">CBC, BMP, hepatic panel, INR daily</div><div class=\"ph-li\">If bx confirms rejection: solumedrol per protocol → prednisone taper</div><div class=\"ph-li\">If prednisone 20mg for &gt;4 weeks  PJP ppx (TMP-SMX vs atovaquone for those with renal insufficiency)</div>", "x": "Acute Rejection of Transplanted Liver\n- Transplanted ***; prior rejections ***; prior ATG *** (dose ***)\nPlan:\n- RUQ Doppler, CT liver triple-phase; NPO (possible bx); IR for TJL biopsy (f/u AM)\n- Continue immunosuppression: tacrolimus ***, MMF ***; FK trough <1h before AM dose\n- CBC, BMP, hepatic panel, INR daily\n- If bx confirms rejection: solumedrol per protocol → prednisone taper\n- If prednisone 20mg for >4 weeks  PJP ppx (TMP-SMX vs atovaquone for those with renal insufficiency)", "q": "acute rejection of transplanted liver - transplanted ***; prior rejections ***; prior atg *** (dose ***) plan: - ruq doppler, ct liver triple-phase; npo (possible bx); ir for tjl biopsy (f/u am) - continue immunosuppression: tacrolimus ***, mmf ***; fk trough <1h before am dose - cbc, bmp, hepatic panel, inr daily - if bx confirms rejection: solumedrol per protocol → prednisone taper - if prednisone 20mg for >4 weeks pjp ppx (tmp-smx vs atovaquone for those with renal insufficiency)"}, {"t": "Adrenal Incidentaloma", "L": "A", "h": "<div class=\"ph-li\">Size *** {Mm/cm:30693}; functional vs nonfunctional</div><div class=\"ph-li\">Serum aldosterone, plasma renin; 24h urine metanephrines/catecholamines/cortisol</div><div class=\"ph-li\">Can consider renal vein sampling for definitive diagnoses if concern for pheochromocytoma vs primary hyperaldosteronism, will reach out to endocrinology for recommendations</div>", "x": "Adrenal Incidentaloma\n- Size *** {Mm/cm:30693}; functional vs nonfunctional\n- Serum aldosterone, plasma renin; 24h urine metanephrines/catecholamines/cortisol\n- Can consider renal vein sampling for definitive diagnoses if concern for pheochromocytoma vs primary hyperaldosteronism, will reach out to endocrinology for recommendations", "q": "adrenal incidentaloma - size *** {mm/cm:30693}; functional vs nonfunctional - serum aldosterone, plasma renin; 24h urine metanephrines/catecholamines/cortisol - can consider renal vein sampling for definitive diagnoses if concern for pheochromocytoma vs primary hyperaldosteronism, will reach out to endocrinology for recommendations"}, {"t": "Altered Mental Status / Acute Encephalopathy — likely 2/2 ***", "L": "A", "h": "<div class=\"ph-li\"><b>DDx:</b> acidosis, intoxication, arrhythmia, DKA, lytes, hypoglycemia, hypoxia, hypothyroid, ICH, mass, meningitis, PNA, polysubstance, seizure, sepsis, stroke, trauma, UTI, uremia</div><div class=\"ph-li\">Risk factors ***; no trauma/seizure/stroke hx per chart</div><div class=\"ph-li\"><b>Sepsis:</b> WBC ***, procal ***, BP ***, HR ***</div><div class=\"ph-li\"><b>Lytes:</b> Na ***, K ***, Mg ***, BUN ***, Ca ***, TSH/T3 ***, BG ***, lactate ***; UDS ***; ABG pH ***; ED meds ***; CT head ***; EKG WNL</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\"><b>If unstable:</b> blood cx x2, lactate, procal</div><div class=\"ph-li\">Non-pharm delirium protocol; monitor for infection</div><div class=\"ph-li\">UA, CT head, EtOH, CXR, UDS; ***</div>", "x": "Altered Mental Status / Acute Encephalopathy — likely 2/2 ***\n- DDx: acidosis, intoxication, arrhythmia, DKA, lytes, hypoglycemia, hypoxia, hypothyroid, ICH, mass, meningitis, PNA, polysubstance, seizure, sepsis, stroke, trauma, UTI, uremia\n- Risk factors ***; no trauma/seizure/stroke hx per chart\n- Sepsis: WBC ***, procal ***, BP ***, HR ***\n- Lytes: Na ***, K ***, Mg ***, BUN ***, Ca ***, TSH/T3 ***, BG ***, lactate ***; UDS ***; ABG pH ***; ED meds ***; CT head ***; EKG WNL\nPlan:\n- If unstable: blood cx x2, lactate, procal\n- Non-pharm delirium protocol; monitor for infection\n- UA, CT head, EtOH, CXR, UDS; ***", "q": "altered mental status / acute encephalopathy — likely 2/2 *** - ddx: acidosis, intoxication, arrhythmia, dka, lytes, hypoglycemia, hypoxia, hypothyroid, ich, mass, meningitis, pna, polysubstance, seizure, sepsis, stroke, trauma, uti, uremia - risk factors ***; no trauma/seizure/stroke hx per chart - sepsis: wbc ***, procal ***, bp ***, hr *** - lytes: na ***, k ***, mg ***, bun ***, ca ***, tsh/t3 ***, bg ***, lactate ***; uds ***; abg ph ***; ed meds ***; ct head ***; ekg wnl plan: - if unstable: blood cx x2, lactate, procal - non-pharm delirium protocol; monitor for infection - ua, ct head, etoh, cxr, uds; ***"}, {"t": "Anemia, {Desc; symptomatic/asymptomatic:10923}", "L": "A", "h": "<div class=\ ss=\"ph-plan\">Plan:</div><div class=\"ph-li\">ESR, CRP, TSH, C4, CBC w/diff (eos), IgE, serum tryptase, UA + urine eos</div><div class=\"ph-li\">Famotidine 20 BID, diphenhydramine 25 q6h, prednisone 40 daily</div><div class=\"ph-li\">Cramping → CT abd/pel; NPO sips/chips → advance as tolerated</div>", "x": "Angioedema of *** (Ishoo stage ***)\n- 1 facial/lip; 2 soft palate (IMC); 3 tongue (ICU); 4 laryngeal (ICU)\n- Drug: NSAIDs, ACE/ARB, CCB, estrogens, cocaine, new meds (e.g. sildenafil); less likely Keppra, sirolimus/everolimus, amiodarone, metoprolol, risperidone, paroxetine, biologics\n- Bradykinin-mediated: no urticaria/pruritus\n- ACE-I/ARB or DPP-4 use? ***; other meds ***; foods/allergens ***; FHx; travel (ascaris→O&P); tick (alpha-gal)\n- Consider CT for SVC syndrome / Lemierre\nPlan:\n- ESR, CRP, TSH, C4, CBC w/diff (eos), IgE, serum tryptase, UA + urine eos\n- Famotidine 20 BID, diphenhydramine 25 q6h, prednisone 40 daily\n- Cramping → CT abd/pel; NPO sips/chips → advance as tolerated", "q": "angioedema of *** (ishoo stage ***) - 1 facial/lip; 2 soft palate (imc); 3 tongue (icu); 4 laryngeal (icu) - drug: nsaids, ace/arb, ccb, estrogens, cocaine, new meds (e.g. sildenafil); less likely keppra, sirolimus/everolimus, amiodarone, metoprolol, risperidone, paroxetine, biologics - bradykinin-mediated: no urticaria/pruritus - ace-i/arb or dpp-4 use? ***; other meds ***; foods/allergens ***; fhx; travel (ascaris→o&p); tick (alpha-gal) - consider ct for svc syndrome / lemierre plan: - esr, crp, tsh, c4, cbc w/diff (eos), ige, serum tryptase, ua + urine eos - famotidine 20 bid, diphenhydramine 25 q6h, prednisone 40 daily - cramping → ct abd/pel; npo sips/chips → advance as tolerated"}, {"t": "Aortic Stenosis: {ITASGRADES:43743}", "L": "A", "h": "<div class=\"ph-li\">{ITASDXLIST:43744}; AVA *** cm2, mean gradient *** mmHg, jet *** m/s</div><div class=\"ph-li\">Later-peaking murmur = worse; first sx usually exertional dyspnea/↓tolerance; classic {ITASSymps:43765}</ ) - rhythm control: *** (amiodarone → baseline lfts/cxr/tsh; anticoagulate before chemical conversion) - anticoagulation: ***"}, {"t": "Autoimmune Encephalitis", "L": "A", "h": "<div class=\"ph-li\">Subacute STM deficits, seizures, bitemporal/limbic dysfunction, psych sx, CSF pleocytosis</div><div class=\"ph-li\">Consider in young female w/ teratoma/ovarian mass</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">Continuous EEG; MRI orbits/brain/C-/T-spine</div><div class=\"ph-li\">Serum + CSF anti-NMDA/LGI1 (CSF preferred); LP for WBC + encephalitis panel; teratoma/ovarian mass → surgery</div><div class=\"ph-li\"><b>1st line:</b> methylprednisolone 1g daily x3-5d, IVIG 2g/kg over 5d, ±PLEX (q other day x5-7)</div><div class=\"ph-li\"><b>2nd line:</b> rituximab 375mg/m2 weekly x4, cyclophosphamide 750mg/m2 monthly x3-6</div><div class=\"ph-li\"><b>Steroid-sparing:</b> azathioprine, MMF</div>", "x": "Autoimmune Encephalitis\n- Subacute STM deficits, seizures, bitemporal/limbic dysfunction, psych sx, CSF pleocytosis\n- Consider in young female w/ teratoma/ovarian mass\nPlan:\n- Continuous EEG; MRI orbits/brain/C-/T-spine\n- Serum + CSF anti-NMDA/LGI1 (CSF preferred); LP for WBC + encephalitis panel; teratoma/ovarian mass → surgery\n- 1st line: methylprednisolone 1g daily x3-5d, IVIG 2g/kg over 5d, ±PLEX (q other day x5-7)\n- 2nd line: rituximab 375mg/m2 weekly x4, cyclophosphamide 750mg/m2 monthly x3-6\n- Steroid-sparing: azathioprine, MMF", "q": "autoimmune encephalitis - subacute stm deficits, seizures, bitemporal/limbic dysfunction, psych sx, csf pleocytosis - consider in young female w/ teratoma/ovarian mass plan: - continuous eeg; mri orbits/brain/c-/t-spine - serum + csf anti-nmda/lgi1 (csf preferred); lp for wbc + encephalitis panel; teratoma/ovarian mass → surgery - 1st line: methylprednisolone 1g daily x3-5d, ivig 2g/kg over 5d, ±plex (q other day x5-7) - 2nd line: rituximab 375mg/m2 weekly x4, cyclophosphamide 750mg/m2 monthly x3-6 - steroid-sparing: azathioprine, mmf"}, {"t": "Benign Prostatic Hyperplasia", "L": "B", "h": "<div class=\"ph-li\">Home med ***</div><div class=\"ph-li\">Tamsulosin 0.4mg (up to 0.8) qHS (orthostasis risk); add finasteride 5mg daily</div><div class=\"ph-li\">Dual therapy ↑orthostasis (~18%)</div>", "x": "Benign Prostatic Hyperplasia\n- Home med ***\n- Tamsulosin 0.4mg (up to 0.8) qHS (orthostasis risk); add finasteride 5mg daily\n- Dual therapy ↑orthostasis (~18%)", "q": "benign prostatic hyperplasia - home med *** - tamsulosin 0.4mg (up to 0.8) qhs (orthostasis risk); add finasteride 5mg daily - dual therapy ↑orthostasis (~18%)"}, {"t": "Biliary Sepsis (Cholangitis / Cholecystitis)", "L": "B", "h": "<div class=\"ph-li\"><b>Cholangitis:</b> systemic inflammation + cholestasis + CBD dilation</div><div class=\"ph-li\"><b>Cholecystitis:</b> systemic + local (Murphy/RUQ) inflammation + imaging</div><div class=\"ph-li\">RUQ US ***; CT abd/pel ***; NLR ***</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">CBC w/diff, BMP, Mg, Phos, hepatic panel, lipase; blood cx x2, procal, lactate; IVF to euvolemia</div><div class=\"ph-li\">Zosyn x4-7d (meropenem if ESBL risk)</div><div class=\"ph-li\">Cholangitis → GI for ERCP; cholecystitis not improving → perc drain (IR) + culture bile</div>", "x": "Biliary Sepsis (Cholangitis / Cholecystitis)\n- Cholangitis: systemic inflammation + cholestasis + CBD dilation\n- Cholecystitis: systemic + local (Murphy/RUQ) inflammation + imaging\n- RUQ US ***; CT abd/pel ***; NLR ***\nPlan:\n- CBC w/diff, BMP, Mg, Phos, hepatic panel, lipase; blood cx x2, procal, lactate; IVF to euvolemia\n- Zosyn x4-7d (meropenem if ESBL risk)\n- Cholangitis → GI for ERCP; cholecystitis not improving → perc drain (IR) + culture bile", "q": "biliary sepsis (cholangitis / cholecystitis) - cholangitis: systemic inflammation + cholestasis + cbd dilation - cholecystitis: systemic + local (murphy/ruq) inflammation + imaging - ruq us ***; ct abd/pel ***; nlr *** plan: - cbc w/diff ) ***; CXR ***; CT *** (ground-glass perihilar/upper, peripheral sparing, crazy-paving, upper-lobe cysts)</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">HIV; CBC w/diff; early bronchoscopy preferred</div><div class=\"ph-li\"><b>If not candidate:</b> induced sputum, procal, β-D-glucan, urine pneumococcus/legionella, fungal antigens, MRSA nares, RVP, ±CT</div><div class=\"ph-li\"><b>Broad:</b> azithromycin + ceftriaxone + TMP-SMX x21d (+prednisone 40 BID); 2nd line primaquine 30 daily + clindamycin 900 IV q8h; HIV+ → start ART</div><div class=\"ph-li\">Steroids if PaO2 &lt;70 or A-a &gt;35: prednisone 40 BID (d1-5) → 40 daily (d6-11) → 20 daily (d12-21)</div>", "x": "Pneumocystis (PJP) Pneumonia\n- Immunocompromised? (HIV, malignancy, immunosuppressants) ***; CXR ***; CT *** (ground-glass perihilar/upper, peripheral sparing, crazy-paving, upper-lobe cysts)\nPlan:\n- HIV; CBC w/diff; early bronchoscopy preferred\n- If not candidate: induced sputum, procal, β-D-glucan, urine pneumococcus/legionella, fungal antigens, MRSA nares, RVP, ±CT\n- Broad: azithromycin + ceftriaxone + TMP-SMX x21d (+prednisone 40 BID); 2nd line primaquine 30 daily + clindamycin 900 IV q8h; HIV+ → start ART\n- Steroids if PaO2 <70 or A-a >35: prednisone 40 BID (d1-5) → 40 daily (d6-11) → 20 daily (d12-21)", "q": "pneumocystis (pjp) pneumonia - immunocompromised? (hiv, malignancy, immunosuppressants) ***; cxr ***; ct *** (ground-glass perihilar/upper, peripheral sparing, crazy-paving, upper-lobe cysts) plan: - hiv; cbc w/diff; early bronchoscopy preferred - if not candidate: induced sputum, procal, β-d-glucan, urine pneumococcus/legionella, fungal antigens, mrsa nares, rvp, ±ct - broad: azithromycin + ceftriaxone + tmp-smx x21d (+prednisone 40 bid); 2nd line primaquine 30 daily + clindamycin 900 iv q8h; hiv+ → start art - steroids if pao2 <70 or a-a >35: prednisone 40 bid (d1-5) → 40 daily (d6-11) → 20 daily (d12-21)"}, {"t": "Pneumonia, {Aspiration/CAP/HAP/VAP}", "L": "P", "h": "<div
