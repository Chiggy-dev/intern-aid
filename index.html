 i/o, daily weights; tte w/ contrast - pre-capillary = i/iii/iv/v; post-capillary = ii"}, {"t": "Rhabdomyolysis, {mild/moderate/severe} — McMahon ***", "L": "R", "h": "<div class=\"ph-li\">Sx ***; oliguria? ***; inciting event ***; supplements/drugs {YES/NO:20566}</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">High-rate fluids 400-1200 cc/hr (currently *** NS); avoid nephro/myotoxins; watch compartment syndrome + fluid overload</div><div class=\"ph-li\">Trend BMP/Mg/Phos + CK (t½ 36h — modify 5000 cutoff); monitor I/O; UDS</div><div class=\"ph-li\">Uremic + acidotic + normocalcemic → isotonic bicarb (BICAR-ICU)</div>", "x": "Rhabdomyolysis, {mild/moderate/severe} — McMahon ***\n- Sx ***; oliguria? ***; inciting event ***; supplements/drugs {YES/NO:20566}\nPlan:\n- High-rate fluids 400-1200 cc/hr (currently *** NS); avoid nephro/myotoxins; watch compartment syndrome + fluid overload\n- Trend BMP/Mg/Phos + CK (t½ 36h — modify 5000 cutoff); monitor I/O; UDS\n- Uremic + acidotic + normocalcemic → isotonic bicarb (BICAR-ICU)", "q": "rhabdomyolysis, {mild/moderate/severe} — mcmahon *** - sx ***; oliguria? ***; inciting event ***; supplements/drugs {yes/no:20566} plan: - high-rate fluids 400-1200 cc/hr (currently *** ns); avoid nephro/myotoxins; watch compartment syndrome + fluid overload - trend bmp/mg/phos + ck (t½ 36h — modify 5000 cutoff); monitor i/o; uds - uremic + acidotic + normocalcemic → isotonic bicarb (bicar-icu)"}, {"t": "SCAPE (Sympathetic Crashing Acute Pulmonary Edema)", "L": "S", "h": "<div class=\"ph-li\"><b>Signs:</b> rapid severe dyspnea, hypoxemia, HTN (SBP &gt;160 / MAP &gt;120)</div><div class=\"ph-li\"><b>Risk:</b> LV dysfunction, RV overfunction, renal artery stenosis, HTN hx</div><div class=\"ph-li\"><b>Triggers:</b> antiHTN nonadherence, volume overload, withdrawal, sympathomimetics, MI, stress; if subacute systemic congestion → FOSPE</div><div class=\"ph-li\">CXR/lung US ***</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">Hold beta blockers; nitro gtt to ↓MAP 20-30 or SBP &lt;140 (bolus 1-2k mcg over 2min, then 100-300 mcg/min); refractory → clevidipine/nicardipine gtt</div><div class=\"ph-li\">CPAP 15-18 or BiPAP 18/15 (±IV midazolam); if unclear volume → lasix 40-60 IV</div>", "x": "SCAPE (Sympathetic Crashing Acute Pulmonary Edema)\n- Signs: rapid severe dyspnea, hypoxemia, HTN (SBP >160 / MAP >120)\n- Risk: LV dysfunction, RV overfunction, renal artery stenosis, HTN hx\n- Triggers: antiHTN nonadherence, volume overload, withdrawal, sympathomimetics, MI, stress; if subacute systemic congestion → FOSPE\n- CXR/lung US ***\nPlan:\n- Hold beta blockers; nitro gtt to ↓MAP 20-30 or SBP <140 (bolus 1-2k mcg over 2min, then 100-300 mcg/min); refractory → clevidipine/nicardipine gtt\n- CPAP 15-18 or BiPAP 18/15 (±IV midazolam); if unclear volume → lasix 40-60 IV", "q": "scape (sympathetic crashing acute pulmonary edema) - signs: rapid severe dyspnea, hypoxemia, htn (sbp >160 / map >120) - risk: lv dysfunction, rv overfunction, renal artery stenosis, htn hx - triggers: antihtn nonadherence, volume overload, withdrawal, sympathomimetics, mi, stress; if subacute systemic congestion → fospe - cxr/lung us *** plan: - hold beta blockers; nitro gtt to ↓map 20-30 or sbp <140 (bolus 1-2k mcg over 2min, then 100-300 mcg/min); refractory → clevidipine/nicardipine gtt - cpap 15-18 or bipap 18/15 (±iv midazolam); if unclear volume → lasix 40-60 iv"}, {"t": "Sepsis with or without septic shock, {qSOFA/}", "L": "S", "h": "<div class=\"ph-li\">Source {Source of Infection:304020120}; end-organ {End Organ Dysfunction:304020016}</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">DVT ppx; sepsis labs {ok3 sepsis labs:42558}</div><div class=\"ph-li\"><b>Abx:</b> vanc + cefepime + Flagyl (GI); vanc + ceftriaxone + azithro (pulm); + Diflucan if fever &gt;48h on abx</div><div class=\"ph-li\">Fluids + repeat lactate {Select one or more:4080377}; pressors? {YES/NO:20566} goal {Select one or both:4080378}</div>", "x": "Sepsis with or without septic shock, {qSOFA/}\n- Source {Source of Infection:304020120}; end-organ {End Organ Dysfunction:304020016}\nPlan:\n- DVT ppx; sepsis labs {ok3 sepsis labs:42558}\n- Abx: vanc + cefepime + Flagyl (GI); vanc + ceftriaxone + azithro (pulm); + Diflucan if fever >48h on abx\n- Fluids + repeat lactate {Select one or more:4080377}; pressors? {YES/NO:20566} goal {Select one or both:4080378}", "q": "sepsis with or without septic shock, {qsofa/} - source {source of infection:304020120}; end-organ {end organ dysfunction:304020016} plan: - dvt ppx; sepsis labs {ok3 sepsis labs:42558} - abx: vanc + cefepime + flagyl (gi); vanc + ceftriaxone + azithro (pulm); + diflucan if fever >48h on abx - fluids + repeat lactate {select one or more:4080377}; pressors? {yes/no:20566} goal {select one or both:4080378}"}, {"t": "Sickle Cell — Acute Chest Syndrome", "L": "S", "h": "<div class=\"ph-li\">Prior ACS / lung VOC? ***</div><div class=\"ph-li\"><b>Triggers:</b> VOC, infection, surgery, PE, asthma, pulm edema, atelectasis, opioid hypoventilation</div><div class=\"ph-li\"><b>Sx:</b> pleuritic/bone chest pain, dyspnea, tachypnea, fever, cough, hemoptysis, neuro</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\"><b>Imaging:</b> CXR, CTA PE, TTE</div><div class=\"ph-li\">Cultures (blood + sputum), procal, RVP</div><div class=\"ph-li\">CBC, CMP, iCa, Hgb electrophoresis, T&amp;S, PT/INR, aPTT, fibrinogen</div><div class=\"ph-li\">Resp support to SpO2 &gt;95%; avoid atelectasis (IS/BiPAP)</div><div class=\"ph-li\">IVF to euvolemia; multimodal analgesia; bronchodilators if bronchospasm</div><div class=\"ph-li\">Abx (CAP + atypical): ceftriaxone + azithromycin</div><div class=\"ph-li\"><b>Simple transfusion:</b> Hgb &lt;7 (not severe), &lt;5 (severe)</div><div class=\"ph-li\">Exchange transfusion if severe hypoxemia/rapid deterioration/multi-organ/failure to improve — notify blood bank</div>", "x": "Sickle Cell — Acute Chest Syndrome\n- Prior ACS / lung VOC? ***\n- Triggers: VOC, infection, surgery, PE, asthma, pulm edema, atelectasis, opioid hypoventilation\n- Sx: pleuritic/bone chest pain, dyspnea, tachypnea, fever, cough, hemoptysis, neuro\nPlan:\n- Imaging: CXR, CTA PE, TTE\n- Cultures (blood + sputum), procal, RVP\n- CBC, CMP, iCa, Hgb electrophoresis, T&S, PT/INR, aPTT, fibrinogen\n- Resp support to SpO2 >95%; avoid atelectasis (IS/BiPAP)\n- IVF to euvolemia; multimodal analgesia; bronchodilators if bronchospasm\n- Abx (CAP + atypical): ceftriaxone + azithromycin\n- Simple transfusion: Hgb <7 (not severe), <5 (severe)\n- Exchange transfusion if severe hypoxemia/rapid deterioration/multi-organ/failure to improve — notify blood bank", "q": "sickle cell — acute chest syndrome - prior acs / lung voc? *** - triggers: voc, infection, surgery, pe, asthma, pulm edema, atelectasis, opioid hypoventilation - sx: pleuritic/bone chest pain, dyspnea, tachypnea, fever, cough, hemoptysis, neuro plan: - imaging: cxr, cta pe, tte - cultures (blood + sputum), procal, rvp - cbc, cmp, ica, hgb electrophoresis, t&s, pt/inr, aptt, fibrinogen - resp support to spo2 >95%; avoid atelectasis (is/bipap) - ivf to euvolemia; multimodal analgesia; bronchodilators if bronchospasm - abx (cap + atypical): ceftriaxone + azithromycin - simple transfusion: hgb <7 (not severe), <5 (severe) - exchange transfusion if severe hypoxemia/rapid deterioration/multi-organ/failure to improve — notify blood bank"}, {"t": "Small Bowel Obstruction", "L": "S", "h": "<div class=\"ph-li\">Type *** (partial/complete); cause *** (hernia, adhesions, stricture, intussusception, volvulus, malignancy, Crohn, gallstone, stool); abd exam ***; KUB ***; last BM ***</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">Serial abd exams; PO→IV meds; NPO/bowel rest + maintenance fluids; NG to suction; avoid opiates/anticholinergics; surgery if converting to complete</div>", "x": "Small Bowel Obstruction\n- Type *** (partial/complete); cause *** (hernia, adhesions, stricture, intussusception, volvulus, malignancy, Crohn, gallstone, stool); abd exam ***; KUB ***; last BM ***\nPlan:\n- Serial abd exams; PO→IV meds; NPO/bowel rest + maintenance fluids; NG to suction; avoid opiates/anticholinergics; surgery if converting to complete", "q": "small bowel obstruction - type *** (partial/complete); cause *** (hernia, adhesions, stricture, intussusception, volvulus, malignancy, crohn, gallstone, stool); abd exam ***; kub ***; last bm *** plan: - serial abd exams; po→iv meds; npo/bowel rest + maintenance fluids; ng to suction; avoid opiates/anticholinergics; surgery if converting to complete"}, {"t": "Starvation Ketoacidosis", "L": "S", "h": "<div class=\"ph-li\"><b>DDx:</b> DKA, AKA, lactic acidosis, toxic alcohols, uremia, salicylate, sepsis</div><div class=\"ph-li\"><b>Sx:</b> N/V, abd pain, dehydration, AMS, fatigue, tachypnea, Kussmaul; β-OHB ***; lactate ***; gap ***</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">Insulin; replete lytes; β-OHB; UA (ketonuria); monitor refeeding; BMP/Mg/Phos/VBG/serum osm; thiamine + folate; ±salicylate level</div><div class=\"ph-li\">D5LR @ *** mL/hr (correct hypokalemia before glucose)</div>", "x": "Starvation Ketoacidosis\n- DDx: DKA, AKA, lactic acidosis, toxic alcohols, uremia, salicylate, sepsis\n- Sx: N/V, abd pain, dehydration, AMS, fatigue, tachypnea, Kussmaul; β-OHB ***; lactate ***; gap ***\nPlan:\n- Insulin; replete lytes; β-OHB; UA (ketonuria); monitor refeeding; BMP/Mg/Phos/VBG/serum osm; thiamine + folate; ±salicylate level\n- D5LR @ *** mL/hr (correct hypokalemia before glucose)", "q": "starvation ketoacidosis - ddx: dka, aka, lactic acidosis, toxic alcohols, uremia, salicylate, sepsis - sx: n/v, abd pain, dehydration, ams, fatigue, tachypnea, kussmaul; β-ohb ***; lactate ***; gap *** plan: - insulin; replete lytes; β-ohb; ua (ketonuria); monitor refeeding; bmp/mg/phos/vbg/serum osm; thiamine + folate; ±salicylate level - d5lr @ *** ml/hr (correct hypokalemia before glucose)"}, {"t": "STEMI — Leads (***)", "L": "S", "h": "<div class=\"ph-li\"><b>DDx:</b> MI, vasospasm/microvascular, Takotsubo, myocarditis, thromboembolism (AF/PFO), dissection, vascular steal, myocardial bridge, vasculitis</div><div class=\"ph-li\"><b>Sx:</b> SOB, diaphoresis, chest pain; STE leads ***; trops ***→***→***; A1c + lipids; LHC ***; TTE</div><div class=\"ph-li\">RV MI → move V4 to right chest; if suspected, r/o PE (CTA)</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">Atorvastatin 80; CYP2C19 testing; serial EKG + trend trops; transfuse Hgb &gt;8; SL nitro PRN (ensure no inferior wall MI)</div><div class=\"ph-li\">ACE/ARB (esp EF &lt;40%); heparin ACS protocol (48h benefit if cath); ASA 325→81, Brilinta 180→90 BID, intraproc Aggrastat</div><div class=\"ph-li\">Metoprolol 25 q12h (HR 50-60; hold if shock/AVB); defer O2 (↑infarct size if not hypoxic)</div><div class=\"ph-li\">LAD infarct + ↓EF → spironolactone within 7d (EPHESUS)</div><div class=\"ph-li\"><b>Post-cath:</b> repeat ECG/echo, telemetry, trops to peak, fasting lipids/TSH/A1c, ensure DAPT (unless CABG); cardiac rehab/post-MI clinic</div>", "x": "STEMI — Leads (***)\n- DDx: MI, vasospasm/microvascular, Takotsubo, myocarditis, thromboembolism (AF/PFO), dissection, vascular steal, myocardial bridge, vasculitis\n- Sx: SOB, diaphoresis, chest pain; STE leads ***; trops ***→***→***; A1c + lipids; LHC ***; TTE\n- RV MI → move V4 to right chest; if suspected, r/o PE (CTA)\nPlan:\n- Atorvastatin 80; CYP2C19 testing; serial EKG + trend trops; transfuse Hgb >8; SL nitro PRN (ensure no inferior wall MI)\n- ACE/ARB (esp EF <40%); heparin ACS protocol (48h benefit if cath); ASA 325→81, Brilinta 180→90 BID, intraproc Aggrastat\n- Metoprolol 25 q12h (HR 50-60; hold if shock/AVB); defer O2 (↑infarct size if not hypoxic)\n- LAD infarct + ↓EF → spironolactone within 7d (EPHESUS)\n- Post-cath: repeat ECG/echo, telemetry, trops to peak, fasting lipids/TSH/A1c, ensure DAPT (unless CABG); cardiac rehab/post-MI clinic", "q": "stemi — leads (***) - ddx: mi, vasospasm/microvascular, takotsubo, myocarditis, thromboembolism (af/pfo), dissection, vascular steal, myocardial bridge, vasculitis - sx: sob, diaphoresis, chest pain; ste leads ***; trops ***→***→***; a1c + lipids; lhc ***; tte - rv mi → move v4 to right chest; if suspected, r/o pe (cta) plan: - atorvastatin 80; cyp2c19 testing; serial ekg + trend trops; transfuse hgb >8; sl nitro prn (ensure no inferior wall mi) - ace/arb (esp ef <40%); heparin acs protocol (48h benefit if cath); asa 325→81, brilinta 180→90 bid, intraproc aggrastat - metoprolol 25 q12h (hr 50-60; hold if shock/avb); defer o2 (↑infarct size if not hypoxic) - lad infarct + ↓ef → spironolactone within 7d (ephesus) - post-cath: repeat ecg/echo, telemetry, trops to peak, fasting lipids/tsh/a1c, ensure dapt (unless cabg); cardiac rehab/post-mi clinic"}, {"t": "Syncope", "L": "S", "h": "<div class=\"ph-li\"><b>DDx:</b> arrhythmia, orthostatic, vasovagal, neurogenic, seizure, stroke/TIA, psychogenic</div><div class=\"ph-li\">Prior episodes {YES/NO:20566}; description ***; cardiac hx ***; neuro hx ***; orthostatics (lying/sitting/standing ***); CT head ***; EKG ***; BNP ***, trop ***</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\"><b>Orthostatic:</b> vitals, PO hydration, hold antiHTN/diuretics</div><div class=\"ph-li\"><b>Cardiac:</b> TTE w/ bubble, EKG, telemetry, carotid US, device interrogation</div><div class=\"ph-li\"><b>Neuro/seizure:</b> prolactin, lactate, EEG</div><div class=\"ph-li\"><b>Prodrome:</b> lightheaded/blurry → VV vs orthostatic; nausea/sweating → VV; no prodrome → cardiogenic; palpitations → arrhythmia</div>", "x": "Syncope\n- DDx: arrhythmia, orthostatic, vasovagal, neurogenic, seizure, stroke/TIA, psychogenic\n- Prior episodes {YES/NO:20566}; description ***; cardiac hx ***; neuro hx ***; orthostatics (lying/sitting/standing ***); CT head ***; EKG ***; BNP ***, trop ***\nPlan:\n- Orthostatic: vitals, PO hydration, hold antiHTN/diuretics\n- Cardiac: TTE w/ bubble, EKG, telemetry, carotid US, device interrogation\n- Neuro/seizure: prolactin, lactate, EEG\n- Prodrome: lightheaded/blurry → VV vs orthostatic; nausea/sweating → VV; no prodrome → cardiogenic; palpitations → arrhythmia", "q": "syncope - ddx: arrhythmia, orthostatic, vasovagal, neurogenic, seizure, stroke/tia, psychogenic - prior episodes {yes/no:20566}; description ***; cardiac hx ***; neuro hx ***; orthostatics (lying/sitting/standing ***); ct head ***; ekg ***; bnp ***, trop *** plan: - orthostatic: vitals, po hydration, hold antihtn/diuretics - cardiac: tte w/ bubble, ekg, telemetry, carotid us, device interrogation - neuro/seizure: prolactin, lactate, eeg - prodrome: lightheaded/blurry → vv vs orthostatic; nausea/sweating → vv; no prodrome → cardiogenic; palpitations → arrhythmia"}, {"t": "Thyroid Storm", "L": "T", "h": "<div class=\"ph-li\"><b>Triggers:</b> infection, surgery/trauma, PE, MI, stroke, labor/preeclampsia, DKA, hypoglycemia, iodine/contrast, noncompliance, checkpoint inhibitors, ASA tox, hormone OD</div><div class=\"ph-li\"><b>Burch:</b> &gt;45 suggestive, 25-44 impending, &lt;25 unlikely (fever, tachycardia, CNS, GI, HF, AF, precipitant)</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">Coags (INR/PTT/fibrinogen); glucose, BMP, Mg, Phos, CBC, AST/ALT, CK; TSH/fT4/fT3</div><div class=\"ph-li\">Hydrocortisone 300mg IV load → 100mg q8h (or methylpred 125mg)</div><div class=\"ph-li\">Methimazole 40mg load → 20mg q4h (PTU if pregnant 1st tri)</div><div class=\"ph-li\">Iodine &gt;1h after methimazole: Lugol's 8 gtt q6h or SSKI 5 gtt q6h</div><div class=\"ph-li\">Tylenol 650-1000 q6h; cholestyramine 4g q6h</div><div class=\"ph-li\">Propranolol 60-80 q4-6h or esmolol gtt (avoid if shock/cardiogenic edema)</div>", "x": "Thyroid Storm\n- Triggers: infection, surgery/trauma, PE, MI, stroke, labor/preeclampsia, DKA, hypoglycemia, iodine/contrast, noncompliance, checkpoint inhibitors, ASA tox, hormone OD\n- Burch: >45 suggestive, 25-44 impending, <25 unlikely (fever, tachycardia, CNS, GI, HF, AF, precipitant)\nPlan:\n- Coags (INR/PTT/fibrinogen); glucose, BMP, Mg, Phos, CBC, AST/ALT, CK; TSH/fT4/fT3\n- Hydrocortisone 300mg IV load → 100mg q8h (or methylpred 125mg)\n- Methimazole 40mg load → 20mg q4h (PTU if pregnant 1st tri)\n- Iodine >1h after methimazole: Lugol's 8 gtt q6h or SSKI 5 gtt q6h\n- Tylenol 650-1000 q6h; cholestyramine 4g q6h\n- Propranolol 60-80 q4-6h or esmolol gtt (avoid if shock/cardiogenic edema)", "q": "thyroid storm - triggers: infection, surgery/trauma, pe, mi, stroke, labor/preeclampsia, dka, hypoglycemia, iodine/contrast, noncompliance, checkpoint inhibitors, asa tox, hormone od - burch: >45 suggestive, 25-44 impending, <25 unlikely (fever, tachycardia, cns, gi, hf, af, precipitant) plan: - coags (inr/ptt/fibrinogen); glucose, bmp, mg, phos, cbc, ast/alt, ck; tsh/ft4/ft3 - hydrocortisone 300mg iv load → 100mg q8h (or methylpred 125mg) - methimazole 40mg load → 20mg q4h (ptu if pregnant 1st tri) - iodine >1h after methimazole: lugol's 8 gtt q6h or sski 5 gtt q6h - tylenol 650-1000 q6h; cholestyramine 4g q6h - propranolol 60-80 q4-6h or esmolol gtt (avoid if shock/cardiogenic edema)"}, {"t": "Tick-borne Illness", "L": "T", "h": "<div class=\"ph-li\">Tick bite? Yes***No; wooded/homeless exposure? Yes***No</div><div class=\"ph-li\"><b>Neuro:</b> depression/mood/confusion/seizure/coma; constitutional: fever/malaise/headache</div><div class=\"ph-li\"><b>Derm:</b> erythema migrans (Lyme), maculopapular (RMSF/Ehrlichia/Anaplasma), new HF/pericardial effusion, pallor (Babesia)</div><div class=\"ph-li\"><b>Labs:</b> leukopenia, thrombocytopenia, ↑AST/ALT, ↑alk phos, ↑LDH; Babesia → anemia, ↓haptoglobin, ↑LDH</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">CBC w/diff, liver profile, peripheral smear (intracellular parasites), Ehrlichia Ab, Rickettsia Ab, Lyme Ab, Anaplasma IgM/IgG (ARUP 0097303)</div><div class=\"ph-li\">Start doxycycline 100 BID empirically until ruled in/out</div><div class=\"ph-li\"><b>Note:</b> PCR sensitive early but false-neg after 1wk or 48h abx; smear morulae ~80% (misses 1/5); untreated rickettsia high mortality</div>", "x": "Tick-borne Illness\n- Tick bite? Yes***No; wooded/homeless exposure? Yes***No\n- Neuro: depression/mood/confusion/seizure/coma; constitutional: fever/malaise/headache\n- Derm: erythema migrans (Lyme), maculopapular (RMSF/Ehrlichia/Anaplasma), new HF/pericardial effusion, pallor (Babesia)\n- Labs: leukopenia, thrombocytopenia, ↑AST/ALT, ↑alk phos, ↑LDH; Babesia → anemia, ↓haptoglobin, ↑LDH\nPlan:\n- CBC w/diff, liver profile, peripheral smear (intracellular parasites), Ehrlichia Ab, Rickettsia Ab, Lyme Ab, Anaplasma IgM/IgG (ARUP 0097303)\n- Start doxycycline 100 BID empirically until ruled in/out\n- Note: PCR sensitive early but false-neg after 1wk or 48h abx; smear morulae ~80% (misses 1/5); untreated rickettsia high mortality", "q": "tick-borne illness - tick bite? yes***no; wooded/homeless exposure? yes***no - neuro: depression/mood/confusion/seizure/coma; constitutional: fever/malaise/headache - derm: erythema migrans (lyme), maculopapular (rmsf/ehrlichia/anaplasma), new hf/pericardial effusion, pallor (babesia) - labs: leukopenia, thrombocytopenia, ↑ast/alt, ↑alk phos, ↑ldh; babesia → anemia, ↓haptoglobin, ↑ldh plan: - cbc w/diff, liver profile, peripheral smear (intracellular parasites), ehrlichia ab, rickettsia ab, lyme ab, anaplasma igm/igg (arup 0097303) - start doxycycline 100 bid empirically until ruled in/out - note: pcr sensitive early but false-neg after 1wk or 48h abx; smear morulae ~80% (misses 1/5); untreated rickettsia high mortality"}, {"t": "Torsades / Polymorphic VT", "L": "T", "h": "<div class=\"ph-li\">Pulse → Mg + K infusion; no pulse → defibrillate</div><div class=\"ph-li\"><b>Causes:</b> MI, CM, J-wave syndrome, catecholamine, QT-prolonging meds; lytes ***; QT agents ***</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\ purinol + nephrotoxins; renal diet (↓K/Phos); UA for crystals</div><div class=\"ph-li\">IVF to euvolemia; sevelamer 800-1600 TID w/ meals; uric acid &gt;8 → rasburicase 0.2mg/kg daily x5d (not if anaphylaxis/methemoglobinemia/G6PD)</div><div class=\"ph-li\">Rasburicase indicated for high-risk tumors (lymphomas) as well as with previous history of TLS</div><div class=\"ph-li\">Refractory → nephro for HD</div>", "x": "Tumor Lysis Syndrome\n- Cairo-Bishop: malignancy + ≥2 of K >6, Phos >4.5, uric acid >8, Ca <7\n- Sx: arrhythmia, paresthesias, spasms, seizures, delirium, oliguric renal failure\n- R/o pseudohyperK, rhabdo, hemolysis, hepatic necrosis, crush; recent chemo? {YES/NO:20566}; LDH ***\nPlan:\n- Treat hyperkalemia; d/c allopurinol + nephrotoxins; renal diet (↓K/Phos); UA for crystals\n- IVF to euvolemia; sevelamer 800-1600 TID w/ meals; uric acid >8 → rasburicase 0.2mg/kg daily x5d (not if anaphylaxis/methemoglobinemia/G6PD)\n- Rasburicase indicated for high-risk tumors (lymphomas) as well as with previous history of TLS\n- Refractory → nephro for HD", "q": "tumor lysis syndrome - cairo-bishop: malignancy + ≥2 of k >6, phos >4.5, uric acid >8, ca <7 - sx: arrhythmia, paresthesias, spasms, seizures, delirium, oliguric renal failure - r/o pseudohyperk, rhabdo, hemolysis, hepatic necrosis, crush; recent chemo? {yes/no:20566}; ldh *** plan: - treat hyperkalemia; d/c allopurinol + nephrotoxins; renal diet (↓k/phos); ua for crystals - ivf to euvolemia; sevelamer 800-1600 tid w/ meals; uric acid >8 → rasburicase 0.2mg/kg daily x5d (not if anaphylaxis/methemoglobinemia/g6pd) - rasburicase indicated for high-risk tumors (lymphomas) as well as with previous history of tls - refractory → nephro for hd"}, {"t": "Undifferentiated Shock", "L": "U", "h": "<div class=\"ph-li\"><b>DDx:</b> arrhythmic (tachy &gt;150/brady &lt;45); hypovolemic; cardiogenic (LV failure, acute AR/MR, prosthetic valve thrombosis, LVOTO); RV failure (PE, decomp PH, RV MI); obstructive (tamponade, te  = low co, wide = high co) - tte (valve/volume), lung us (ptx, b-lines), abd us (hemorrhage/aorta); ekg, cxr, ±ct - ivc volume assessment - bmp, ca, mg, phos, cbc, coags, crp, lactate; blood cx x2, ua, procal; cortisol, tsh, trops"}, {"t": "Urinary Tract Infection, {UTI Dx:43504}", "L": "U", "h": "<div class=\"ph-li\">Sx {Symptoms; uti:25106}; systemic? *** (CRP, fever, rigors, instability); foley? {YES/NO:20566}; retention? {YES/NO:20566}; prior ESBL/resistant {Uti organisms:13884}</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">UA (if neutropenic, manually add urine cx); abx {plan; lpn uti:16568}</div><div class=\"ph-li\">Bladder scan if retention; retroperitoneal US if pyelo concern</div>", "x": "Urinary Tract Infection, {UTI Dx:43504}\n- Sx {Symptoms; uti:25106}; systemic? *** (CRP, fever, rigors, instability); foley? {YES/NO:20566}; retention? {YES/NO:20566}; prior ESBL/resistant {Uti organisms:13884}\nPlan:\n- UA (if neutropenic, manually add urine cx); abx {plan; lpn uti:16568}\n- Bladder scan if retention; retroperitoneal US if pyelo concern", "q": "urinary tract infection, {uti dx:43504} - sx {symptoms; uti:25106}; systemic? *** (crp, fever, rigors, instability); foley? {yes/no:20566}; retention? {yes/no:20566}; prior esbl/resistant {uti organisms:13884} plan: - ua (if neutropenic, manually add urine cx); abx {plan; lpn uti:16568} - bladder scan if retention; retroperitoneal us if pyelo concern"}, {"t": "Ventricular Tachycardia Storm (VT/VF)", "L": "V", "h": "<div class=\"ph-li\">≥3 VF/sustained VT requiring intervention in 24h; {Hemodynamic Instability:304511154:p}; type {Ventricular Tachycardia - Type:304511155:p}</div><div class=\"ph-li\">Polymorphic → torsades/ischemia (rarely Brugada/congenital); monomorphic → ischemia/scar</div><div class=\"ph-li\"><b>Triggers:</b> acute MI (→emergent cath), lytes, thyrotoxicosis, sepsis, volume overload, anemia, drugs; last interrogation ***</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">Corr 02mg/kg/min - invasive: ablation, stellate ganglion block, sympathectomy"}, {"t": "Wernicke Encephalopathy", "L": "W", "h": "<div class=\"ph-li\"><b>RF:</b> EtOH, malnutrition, malabsorption, bariatric, dialysis/diuresis, infection, thyrotoxicosis, refeeding, metronidazole</div><div class=\"ph-li\"><b>Triad:</b> encephalopathy, ophthalmoplegia, ataxia</div><div class=\"ph-plan\">Plan:</div><div class=\"ph-li\">Replete Mg; whole-blood thiamine; IV thiamine 500mg q8h + folate; treat comorbidities; ±CT/MRI (may normalize after thiamine)</div>", "x": "Wernicke Encephalopathy\n- RF: EtOH, malnutrition, malabsorption, bariatric, dialysis/diuresis, infection, thyrotoxicosis, refeeding, metronidazole\n- Triad: encephalopathy, ophthalmoplegia, ataxia\nPlan:\n- Replete Mg; whole-blood thiamine; IV thiamine 500mg q8h + folate; treat comorbidities; ±CT/MRI (may normalize after thiamine)", "q": "wernicke encephalopathy - rf: etoh, malnutrition, malabsorption, bariatric, dialysis/diuresis, infection, thyrotoxicosis, refeeding, metronidazole - triad: encephalopathy, ophthalmoplegia, ataxia plan: - replete mg; whole-blood thiamine; iv thiamine 500mg q8h + folate; treat comorbidities; ±ct/mri (may normalize after thiamine)"}];

function renderPhrases(){
  let h = `<div class="card">
    <div class="eyebrow">Smart phrases · dot phrases</div>
    <h2 class="sec">Smart Phrases</h2>
    <p class="lede">Your dot-phrase library (Chirag Lodha, DO), A&ndash;Z. Search, tap to expand, and <b>Copy</b> to paste into Epic. Smart-tokens (\{&hellip;\}, @&hellip;@) and *** wildcards are preserved.</p>
  </div>
  <input class="ph-search" id="phSearch" placeholder="Search conditions or content\u2026" autocomplete="off" autocapitalize="off" spellcheck="false">
  <div class="ph-count" id="phCount"></div>
  <div id="phList">`;
  let lastL="";
  SMARTPHRASES.forEach((p,i)=>{
    if(p.L!==lastL){ h+=`<div class="ph-letter">${p.L}</div>`; lastL=p.L; }
    h+=`<div class="ph-acc" data-q="${p.q}">
      <div class="ph-h"><span class="pt">${p.t}</span><button class="ph-copy" data-i="${i}">Copy</button><span class="arr">\u203a</span></div>
      <div class="ph-body">${p.h}</div>
    </div>`;
  });
  h+=`</div>`;
  view.className="fade"; view.innerHTML=h; window.scrollTo(0,0);
  const list=$("#phList");
  const setCount=()=>{const v=[...list.querySelectorAll(".ph-acc")].filter(a=>a.style.display!=="none").length;$("#phCount").textContent=v+" of "+SMARTPHRASES.length+" phrases";};
  list.querySelectorAll(".ph-h").forEach(hd=>hd.onclick=(e)=>{ if(e.target.classList.contains("ph-copy"))return; hd.parentElement.classList.toggle("open"); });
  list.querySelectorAll(".ph-copy").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); const t=SMARTPHRASES[+b.dataset.i].x; if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>toast("Copied \u2713"),()=>toast("Copy failed"));}else{toast("Copy unavailable");} });
  const inp=$("#phSearch");
  inp.oninput=()=>{
    const q=inp.value.trim().toLowerCase();
    list.querySelectorAll(".ph-acc").forEach(a=>{ a.style.display=(!q||a.dataset.q.indexOf(q)>=0)?"":"none"; });
    list.querySelectorAll(".ph-letter").forEach(div=>{ let n=div.nextElementSibling,any=false; while(n&&!n.classList.contains("ph-letter")){ if(n.classList.contains("ph-acc")&&n.style.display!=="none"){any=true;break;} n=n.nextElementSibling; } div.style.display=any?"":"none"; });
    setCount();
  };
  setCount();
}

/* ---------------- NAV ---------------- */
function setActiveNav(){document.querySelectorAll(".nb").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));}
document.querySelectorAll(".nb").forEach(b=>b.onclick=()=>{
  tab=b.dataset.tab;setActiveNav();
  if(tab==="learn")renderLearn();else if(tab==="cases")renderCases();else if(tab==="lit")renderLit();else if(tab==="tips")renderTips();else if(tab==="phrases")renderPhrases();else renderTools();
});

/* ---------------- BOOT ---------------- */
updProg();
renderLearn();
</script>
</body>
</html>
